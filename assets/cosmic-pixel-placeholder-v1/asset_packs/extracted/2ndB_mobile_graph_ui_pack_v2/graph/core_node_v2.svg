<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="violetCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E"/>
      <stop offset="1" stop-color="#0D1530"/>
    </linearGradient>
  </defs>

  <circle cx="64" cy="64" r="58" fill="url(#violetCore)" opacity="0.8"/>
  <rect x="26" y="84" width="76" height="10" fill="#243056" opacity="0.95"/>
  <rect x="34" y="74" width="60" height="10" fill="#16213E" stroke="#A78BFA" stroke-opacity="0.45"/>
  <rect x="42" y="54" width="44" height="20" fill="url(#nodeSurface)" stroke="#8D98B8" stroke-opacity="0.35"/>
  <rect x="50" y="38" width="28" height="16" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.5"/>
  <rect x="58" y="24" width="12" height="14" fill="#A78BFA" opacity="0.9" filter="url(#tinyGlow)"/>
  <rect x="62" y="12" width="4" height="12" fill="#FFD166" filter="url(#tinyGlow)"/>
  <rect x="46" y="60" width="8" height="8" fill="#72F2C7" opacity="0.75"/>
  <rect x="74" y="60" width="8" height="8" fill="#72F2C7" opacity="0.75"/>
  <path d="M22 62H10M106 62H118M64 104V120M64 8V16" stroke="#72F2C7" stroke-width="3" stroke-linecap="square" opacity="0.45"/>
