<svg xmlns="http://www.w3.org/2000/svg" width="390" height="260" viewBox="0 0 390 260" fill="none" shape-rendering="crispEdges">
  <title>Welcome hero</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="390" height="260" rx="28" fill="url(#bg)"/>
  <circle cx="195" cy="120" r="110" fill="url(#violetGlow)"/>
  <path d="M90 180 C130 95, 175 205, 220 110 S280 105, 310 170" stroke="#243056" stroke-width="5" stroke-linecap="round"/>
  <path d="M90 180 C130 95, 175 205, 220 110 S280 105, 310 170" stroke="#72F2C7" stroke-opacity=".55" stroke-width="2" stroke-dasharray="6 8" stroke-linecap="round"/>
  <g filter="url(#softGlow)">
    <rect x="153" y="76" width="84" height="76" rx="22" fill="#16213E" stroke="#A78BFA" stroke-width="2"/>
    <rect x="174" y="58" width="42" height="18" rx="5" fill="#243056" stroke="#A78BFA"/>
    <rect x="174" y="108" width="9" height="9" fill="#E8ECF8"/>
    <rect x="207" y="108" width="9" height="9" fill="#E8ECF8"/>
    <rect x="186" y="132" width="18" height="6" fill="#72F2C7"/>
    <circle cx="228" cy="88" r="5" fill="#FFD166"/>
  </g>
  <circle cx="90" cy="180" r="10" fill="#FFD166"/>
  <circle cx="220" cy="110" r="11" fill="#A78BFA"/>
  <circle cx="310" cy="170" r="9" fill="#4CC9F0"/>
  <text x="24" y="34" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="18" font-weight="700">밤빛 조각마을에 오신 걸 환영해요</text>
  <text x="24" y="228" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">생각 조각이 연결되어 나만의 지도가 됩니다</text>

</svg>
