<svg xmlns="http://www.w3.org/2000/svg" width="390" height="240" viewBox="0 0 390 240" fill="none" shape-rendering="crispEdges">
  <title>First shard success</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="390" height="240" rx="26" fill="#0D1530" stroke="#243056"/>
  <circle cx="80" cy="96" r="50" fill="#FFD166" opacity=".12"/>
  <path d="M80 56l26 26-10 62H64L54 82l26-26z" fill="#FFD166"/>
  <path d="M160 82 C205 34, 230 148, 300 90" stroke="#243056" stroke-width="5" stroke-linecap="round"/>
  <path d="M160 82 C205 34, 230 148, 300 90" stroke="#72F2C7" stroke-width="2" stroke-dasharray="5 7" stroke-linecap="round"/>
  <circle cx="160" cy="82" r="12" fill="#FFD166"/>
  <circle cx="300" cy="90" r="12" fill="#A78BFA"/>
  <text x="42" y="182" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="18" font-weight="700">첫 조각을 보관했어요</text>
  <text x="42" y="206" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="12">이제 그래프에서 새 길을 확인할 수 있어요.</text>

</svg>
