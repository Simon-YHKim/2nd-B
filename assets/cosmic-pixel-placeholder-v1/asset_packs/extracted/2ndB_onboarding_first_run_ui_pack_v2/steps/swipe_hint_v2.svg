<svg xmlns="http://www.w3.org/2000/svg" width="240" height="68" viewBox="0 0 240 68" fill="none" shape-rendering="crispEdges">
  <title>Swipe hint</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="240" height="68" rx="22" fill="#0D1530" stroke="#243056"/>
  <text x="24" y="42" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">옆으로 넘기며 살펴보기</text>
  <path d="M190 24l18 10-18 10" stroke="#72F2C7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
