<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2ndB Companion Sprite Pack v2</title>
<style>
  :root { --space:#070A18; --panel:#0D1530; --card:#16213E; --line:#243056; --text:#E8ECF8; --muted:#8D98B8; --mint:#72F2C7; }
  * { box-sizing:border-box; }
  body { margin:0; background: radial-gradient(circle at 50% 18%, rgba(167,139,250,.16), transparent 36%), var(--space); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; }
  .wrap { max-width:1160px; margin:0 auto; padding:40px 20px 80px; }
  h1 { margin:0 0 8px; font-size:32px; letter-spacing:-.04em; }
  .lead { margin:0 0 28px; color:var(--muted); line-height:1.65; }
  .character { border:1px solid color-mix(in srgb, var(--accent), transparent 65%); background:rgba(13,21,48,.74); border-radius:24px; padding:18px; margin:18px 0; box-shadow:0 0 24px color-mix(in srgb, var(--accent), transparent 88%); }
  header { display:flex; justify-content:space-between; gap:16px; align-items:baseline; border-bottom:1px solid rgba(141,152,184,.18); padding-bottom:12px; margin-bottom:16px; }
  h2 { margin:0; letter-spacing:-.03em; } h2 span { color:var(--accent); font-size:.75em; margin-left:8px; } header p { margin:0; color:var(--muted); }
  .sprite-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap:12px; }
  figure { margin:0; border:1px solid rgba(141,152,184,.18); background:rgba(7,10,24,.56); border-radius:16px; padding:12px; text-align:center; }
  img { width:72px; height:72px; image-rendering: pixelated; image-rendering: crisp-edges; }
  figcaption { margin-top:8px; font-size:12px; color:var(--muted); }
  .event-cues { margin-top:28px; }
</style>
</head>
<body>
  <main class="wrap">
    <h1>2ndB Companion Sprite Pack v2</h1>
    <p class="lead">세컨비 v2에 이어 적용할 모모, 루루, 아치, 벨라, 가디 상태별 SVG 자산입니다. 모바일 메인에서는 이벤트 피드백으로 짧게 등장시키는 것을 기준으로 설계했습니다.</p>
    <section class="character" style="--accent:#FFD166">
      <header><h2>모모 <span>Momo</span></h2><p>기록 관리자</p></header>
      <div class="sprite-grid"><figure><img src="sprites/momo/momo_idle.svg" alt="momo idle"><figcaption>idle</figcaption></figure>
<figure><img src="sprites/momo/momo_note.svg" alt="momo note"><figcaption>note</figcaption></figure>
<figure><img src="sprites/momo/momo_store.svg" alt="momo store"><figcaption>store</figcaption></figure>
<figure><img src="sprites/momo/momo_read.svg" alt="momo read"><figcaption>read</figcaption></figure>
<figure><img src="sprites/momo/momo_label.svg" alt="momo label"><figcaption>label</figcaption></figure>
<figure><img src="sprites/momo/momo_happy.svg" alt="momo happy"><figcaption>happy</figcaption></figure>
<figure><img src="sprites/momo/momo_sleep.svg" alt="momo sleep"><figcaption>sleep</figcaption></figure></div>
    </section><section class="character" style="--accent:#72F2C7">
      <header><h2>루루 <span>Lulu</span></h2><p>수집 드론</p></header>
      <div class="sprite-grid"><figure><img src="sprites/lulu/lulu_idle.svg" alt="lulu idle"><figcaption>idle</figcaption></figure>
<figure><img src="sprites/lulu/lulu_fly_1.svg" alt="lulu fly_1"><figcaption>fly_1</figcaption></figure>
<figure><img src="sprites/lulu/lulu_fly_2.svg" alt="lulu fly_2"><figcaption>fly_2</figcaption></figure>
<figure><img src="sprites/lulu/lulu_carrying_shard.svg" alt="lulu carrying_shard"><figcaption>carrying_shard</figcaption></figure>
<figure><img src="sprites/lulu/lulu_scan.svg" alt="lulu scan"><figcaption>scan</figcaption></figure>
<figure><img src="sprites/lulu/lulu_success.svg" alt="lulu success"><figcaption>success</figcaption></figure>
<figure><img src="sprites/lulu/lulu_dash.svg" alt="lulu dash"><figcaption>dash</figcaption></figure></div>
    </section><section class="character" style="--accent:#4CC9F0">
      <header><h2>아치 <span>Archi</span></h2><p>연결 설계자</p></header>
      <div class="sprite-grid"><figure><img src="sprites/archi/archi_idle.svg" alt="archi idle"><figcaption>idle</figcaption></figure>
<figure><img src="sprites/archi/archi_linking.svg" alt="archi linking"><figcaption>linking</figcaption></figure>
<figure><img src="sprites/archi/archi_measure.svg" alt="archi measure"><figcaption>measure</figcaption></figure>
<figure><img src="sprites/archi/archi_highlight.svg" alt="archi highlight"><figcaption>highlight</figcaption></figure>
<figure><img src="sprites/archi/archi_thinking.svg" alt="archi thinking"><figcaption>thinking</figcaption></figure>
<figure><img src="sprites/archi/archi_build.svg" alt="archi build"><figcaption>build</figcaption></figure></div>
    </section><section class="character" style="--accent:#FF9FD6">
      <header><h2>벨라 <span>Vela</span></h2><p>공상 확장자</p></header>
      <div class="sprite-grid"><figure><img src="sprites/vela/vela_idle.svg" alt="vela idle"><figcaption>idle</figcaption></figure>
<figure><img src="sprites/vela/vela_spark.svg" alt="vela spark"><figcaption>spark</figcaption></figure>
<figure><img src="sprites/vela/vela_dream.svg" alt="vela dream"><figcaption>dream</figcaption></figure>
<figure><img src="sprites/vela/vela_unfold.svg" alt="vela unfold"><figcaption>unfold</figcaption></figure>
<figure><img src="sprites/vela/vela_save.svg" alt="vela save"><figcaption>save</figcaption></figure>
<figure><img src="sprites/vela/vela_happy.svg" alt="vela happy"><figcaption>happy</figcaption></figure></div>
    </section><section class="character" style="--accent:#FF7A90">
      <header><h2>가디 <span>Gadi</span></h2><p>안전 관리자</p></header>
      <div class="sprite-grid"><figure><img src="sprites/gadi/gadi_idle.svg" alt="gadi idle"><figcaption>idle</figcaption></figure>
<figure><img src="sprites/gadi/gadi_guard.svg" alt="gadi guard"><figcaption>guard</figcaption></figure>
<figure><img src="sprites/gadi/gadi_alert.svg" alt="gadi alert"><figcaption>alert</figcaption></figure>
<figure><img src="sprites/gadi/gadi_soft_stop.svg" alt="gadi soft_stop"><figcaption>soft_stop</figcaption></figure>

    </section>
    <section class="character event-cues" style="--accent:#72F2C7">
      <header><h2>Event Cues <span>short feedback</span></h2><p>저장, 수집, 연결, 공상, 안전 안내</p></header>
      <div class="sprite-grid"><figure><img src="event_cues/journal_saved.svg" alt="journal_saved"><figcaption>journal_saved</figcaption></figure>
<figure><img src="event_cues/capture_saved.svg" alt="capture_saved"><figcaption>capture_saved</figcaption></figure>
<figure><img src="event_cues/link_found.svg" alt="link_found"><figcaption>link_found</figcaption></figure>
<figure><img src="event_cues/imagine_ready.svg" alt="imagine_ready"><figcaption>imagine_ready</figcaption></figure>
<figure><img src="event_cues/safety_soft_stop.svg" alt="safety_soft_stop"><figcaption>safety_soft_stop</figcaption></figure></div>
    </section>
  </main>
</body>
</html>
