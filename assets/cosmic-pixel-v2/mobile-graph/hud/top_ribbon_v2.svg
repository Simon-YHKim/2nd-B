<svg xmlns="http://www.w3.org/2000/svg" width="390" height="84" viewBox="0 0 390 84" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="violetCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E"/>
      <stop offset="1" stop-color="#0D1530"/>
    </linearGradient>
  </defs>

  <rect x="14" y="10" width="362" height="64" rx="18" fill="#0D1530" fill-opacity="0.88" stroke="#A78BFA" stroke-opacity="0.32"/>
  <rect x="28" y="24" width="8" height="8" fill="#FFD166"/>
  <text x="46" y="35" text-anchor="start" font-family="NanumSquareRound, Noto Sans CJK KR, Noto Sans CJK, DejaVu Sans, sans-serif" font-size="13" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">오늘의 중심</text>
  <text x="46" y="56" text-anchor="start" font-family="NanumSquareRound, Noto Sans CJK KR, Noto Sans CJK, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">기록들이 공상 작업실과 연결됐어요.</text>
  <rect x="338" y="28" width="22" height="22" rx="6" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.38"/>
  <path d="M344 39H354M349 34V44" stroke="#72F2C7" stroke-width="2"/>
</svg>