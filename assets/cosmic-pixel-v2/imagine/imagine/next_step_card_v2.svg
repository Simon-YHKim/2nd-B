<svg xmlns="http://www.w3.org/2000/svg" width="350" height="118" viewBox="0 0 350 118" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dreamGlow" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FF9FD6" stop-opacity="0.76"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF9FD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="dreamPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="116" rx="24" fill="#72F2C7" fill-opacity="0.10" stroke="#72F2C7" stroke-opacity="0.34"/>
  <rect x="22" y="32" width="44" height="44" rx="14" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.42"/>
  <path d="M33 54H55M49 48L55 54L49 60" stroke="#72F2C7" stroke-width="3"/>
  <text x="84" y="42" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#72F2C7" shape-rendering="geometricPrecision">다음 한 걸음</text>
  <text x="84" y="68" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">세컨비가 조각을 옮기는 3초 애니메이션 초안 만들기</text>
  <text x="84" y="92" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">오늘 바로 만들 수 있는 크기로 접었어요.</text>
</svg>