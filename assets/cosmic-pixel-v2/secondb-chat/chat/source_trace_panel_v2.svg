<rect class="pixel" x="34" y="106" width="9" height="9" fill="#A78BFA"/>
<text x="54" y="116" class="t" fill="#E8ECF8" font-size="12">만드는 나</text>
<text x="260" y="116" class="t" fill="#8D98B8" font-size="11">persona</text>
