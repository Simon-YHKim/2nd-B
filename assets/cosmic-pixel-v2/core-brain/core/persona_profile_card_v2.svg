<svg xmlns="http://www.w3.org/2000/svg" width="350" height="150" viewBox="0 0 350 150" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="148" rx="22" fill="url(#card)" stroke="#A78BFA" stroke-opacity="0.24"/>
  <rect x="20" y="22" width="54" height="54" rx="18" fill="#0D1530" stroke="#A78BFA" stroke-opacity="0.5"/>
  <rect x="35" y="38" width="7" height="6" fill="#E8ECF8"/><rect x="52" y="38" width="7" height="6" fill="#E8ECF8"/>
  <rect x="39" y="55" width="16" height="4" fill="#72F2C7"/>
  <text x="88" y="36" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="16" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">만드는 나</text>
  <text x="88" y="58" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">조각을 구조로 바꾸는 모습</text>
  <rect x="88" y="78" width="58" height="24" rx="10" fill="#A78BFA" opacity="0.18" stroke="#A78BFA" stroke-opacity="0.32"/><text x="117" y="95" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">who</text>
  <rect x="152" y="78" width="78" height="24" rx="10" fill="#72F2C7" opacity="0.13" stroke="#72F2C7" stroke-opacity="0.32"/><text x="191" y="95" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">for whom</text>
  <rect x="236" y="78" width="58" height="24" rx="10" fill="#4CC9F0" opacity="0.13" stroke="#4CC9F0" stroke-opacity="0.32"/><text x="265" y="95" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">goal</text>
  <rect x="88" y="110" width="58" height="24" rx="10" fill="#FFD166" opacity="0.13" stroke="#FFD166" stroke-opacity="0.32"/><text x="117" y="127" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">do</text>
  <rect x="152" y="110" width="58" height="24" rx="10" fill="#FF9FD6" opacity="0.13" stroke="#FF9FD6" stroke-opacity="0.32"/><text x="181" y="127" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">fuel</text>
</svg>