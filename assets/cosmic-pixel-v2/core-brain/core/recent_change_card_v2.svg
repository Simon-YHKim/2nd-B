<svg xmlns="http://www.w3.org/2000/svg" width="350" height="94" viewBox="0 0 350 94" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="92" rx="20" fill="url(#card)" stroke="#FFD166" stroke-opacity="0.22"/>
  <rect x="20" y="24" width="42" height="42" rx="14" fill="#FFD166" fill-opacity="0.12" stroke="#FFD166" stroke-opacity="0.35"/>
  <path d="M32 48L40 56L54 36" stroke="#FFD166" stroke-width="3" stroke-linejoin="miter"/>
  <text x="78" y="36" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">새로 이어진 길</text>
  <text x="78" y="62" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">기록 보관소에서 공상 작업실로 조각 4개가 이동했어요.</text>
</svg>