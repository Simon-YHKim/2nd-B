<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=510, initial-scale=1">
<title>2nd-B Cosmos Concept</title>
<style>
  :root {
    --bg: #0A0E1A;
    --blue: #46B6FF;
    --ice: #CCFAFF;
    --cyan: #5FD4FF;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    display: grid;
    place-items: center;
  }

  .stage {
    position: relative;
    width: 510px;
    height: 900px;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(ellipse at 50% 49%, rgba(70, 182, 255, 0.12), transparent 23%),
      radial-gradient(ellipse at 18% 21%, rgba(95, 212, 255, 0.08), transparent 30%),
      radial-gradient(ellipse at 84% 78%, rgba(70, 182, 255, 0.07), transparent 32%),
      linear-gradient(180deg, #091026 0%, var(--bg) 52%, #070914 100%);
  }

  .nebula {
    position: absolute;
    inset: -80px -70px;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 36% 18%, rgba(95, 212, 255, 0.12) 0 9%, transparent 34%),
      radial-gradient(ellipse at 72% 35%, rgba(70, 182, 255, 0.13) 0 10%, transparent 38%),
      radial-gradient(ellipse at 43% 67%, rgba(204, 250, 255, 0.07) 0 8%, transparent 30%),
      conic-gradient(from 210deg at 56% 46%, transparent 0 15%, rgba(70, 182, 255, 0.10) 24%, transparent 38%, rgba(95, 212, 255, 0.08) 54%, transparent 72% 100%);
    filter: blur(22px);
    opacity: 0.82;
    animation: nebulaDrift 28s ease-in-out infinite alternate;
    z-index: 1;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 510px;
    height: 900px;
    display: block;
    z-index: 2;
  }

  .soft-vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 49%, transparent 0 27%, rgba(10, 14, 26, 0.16) 48%, rgba(10, 14, 26, 0.73) 100%),
      linear-gradient(180deg, rgba(10, 14, 26, 0.18), transparent 23%, transparent 72%, rgba(10, 14, 26, 0.30));
    z-index: 3;
  }

  .rim-halo {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 340px;
    height: 340px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    background:
      radial-gradient(circle, rgba(204, 250, 255, 0.16), rgba(95, 212, 255, 0.09) 31%, rgba(70, 182, 255, 0.04) 48%, transparent 67%);
    filter: blur(13px);
    opacity: 0.82;
    animation: haloBreath 9s ease-in-out infinite;
    z-index: 4;
  }

  .character {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 240px;
    transform: translate(-50%, -50%);
    z-index: 5;
    filter:
      drop-shadow(0 0 13px rgba(70, 182, 255, 0.84))
      drop-shadow(0 0 34px rgba(95, 212, 255, 0.36));
    animation: floatBot 10s ease-in-out infinite;
  }

  @keyframes nebulaDrift {
    0% {
      transform: translate3d(-12px, -8px, 0) rotate(-1deg) scale(1.02);
    }
    100% {
      transform: translate3d(12px, 13px, 0) rotate(1deg) scale(1.04);
    }
  }

  @keyframes haloBreath {
    0%,
    100% {
      transform: translate(-50%, -50%) scale(0.97);
      opacity: 0.70;
    }
    50% {
      transform: translate(-50%, -50%) scale(1.04);
      opacity: 0.98;
    }
  }

  @keyframes floatBot {
    0%,
    100% {
      transform: translate(-50%, -50%) translateY(0);
    }
    50% {
      transform: translate(-50%, -50%) translateY(-5px);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .nebula,
    .rim-halo,
    .character {
      animation: none;
    }
  }
</style>
</head>
<body>
  <main class="stage" aria-hidden="true">
    <div class="nebula"></div>
    <canvas id="cosmos" width="510" height="900"></canvas>
    <div class="soft-vignette"></div>
    <div class="rim-halo"></div>
    <img class="character" src="../assets/head-angle-v2/secondb_head_angle_v2_r02_level_c01_front.png" alt="">
  </main>
<script>
(() => {
  const canvas = document.getElementById('cosmos');
  const ctx = canvas.getContext('2d');
  const w = 510;
  const h = 900;
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  function mulberry32(seed) {
    return function rand() {
      seed |= 0;
      seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  const rand = mulberry32(240202);
  const stars = Array.from({ length: 94 }, (_, i) => {
    const outer = i % 3 === 0;
    let x = rand() * w;
    let y = rand() * h;
    if (Math.abs(x - 255) < 120 && Math.abs(y - 450) < 150) {
      x += x < 255 ? -95 : 95;
      y += y < 450 ? -80 : 80;
    }
    return {
      x,
      y,
      r: outer ? 1.7 + rand() * 3.2 : 0.7 + rand() * 1.7,
      speed: 0.018 + rand() * 0.045,
      layer: outer ? 1.0 : 0.45 + rand() * 0.45,
      phase: rand() * Math.PI * 2,
      a: outer ? 0.18 + rand() * 0.35 : 0.10 + rand() * 0.28
    };
  });

  const comets = Array.from({ length: 9 }, () => ({
    x: 40 + rand() * 430,
    y: 70 + rand() * 740,
    len: 16 + rand() * 34,
    phase: rand() * Math.PI * 2,
    speed: 0.08 + rand() * 0.10
  }));

  function draw(t) {
    const time = t * 0.001;
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    for (const s of stars) {
      const px = (s.x + Math.sin(time * s.speed + s.phase) * 18 * s.layer + w) % w;
      const py = (s.y + Math.cos(time * s.speed * 0.8 + s.phase) * 11 * s.layer + h) % h;
      const twinkle = 0.72 + Math.sin(time * 0.45 + s.phase) * 0.24;
      const g = ctx.createRadialGradient(px, py, 0, px, py, s.r * 4.4);
      g.addColorStop(0, `rgba(204,250,255,${s.a * twinkle})`);
      g.addColorStop(0.38, `rgba(95,212,255,${s.a * 0.24 * twinkle})`);
      g.addColorStop(1, 'rgba(70,182,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(px, py, s.r * 4.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(204,250,255,${Math.min(0.86, s.a * 1.9 * twinkle)})`;
      ctx.beginPath();
      ctx.arc(px, py, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    for (const c of comets) {
      const drift = Math.sin(time * c.speed + c.phase) * 20;
      const x = c.x + drift;
      const y = c.y + Math.cos(time * c.speed * 0.7 + c.phase) * 10;
      const a = 0.08 + Math.sin(time * 0.3 + c.phase) * 0.035;
      const grad = ctx.createLinearGradient(x - c.len, y + c.len * 0.35, x + c.len, y - c.len * 0.35);
      grad.addColorStop(0, 'rgba(70,182,255,0)');
      grad.addColorStop(0.45, `rgba(95,212,255,${a})`);
      grad.addColorStop(1, `rgba(204,250,255,${a * 1.5})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x - c.len, y + c.len * 0.35);
      ctx.lineTo(x + c.len, y - c.len * 0.35);
      ctx.stroke();
    }

    ctx.restore();
    if (!reduced) requestAnimationFrame(draw);
  }

  draw(0);
})();
</script>
</body>
</html>
