<svg xmlns="http://www.w3.org/2000/svg" width="350" height="128" viewBox="0 0 350 128" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="126" rx="24" fill="#0D1530" fill-opacity="0.76" stroke="#8D98B8" stroke-opacity="0.18"/>
  <text x="22" y="32" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">최근 조각 흐름</text>
  <path d="M40 72H310" stroke="#243056" stroke-width="3"/>
  <path d="M60 62L69 72L64 84L50 79L53 67Z" fill="#16213E" stroke="#FFD166" stroke-width="2"/><rect x="58" y="70" width="4" height="4" fill="#FFD166" filter="url(#tinyGlow)"/><path d="M140 62L149 72L144 84L130 79L133 67Z" fill="#16213E" stroke="#72F2C7" stroke-width="2"/><rect x="138" y="70" width="4" height="4" fill="#72F2C7" filter="url(#tinyGlow)"/><path d="M220 62L229 72L224 84L210 79L213 67Z" fill="#16213E" stroke="#A78BFA" stroke-width="2"/><rect x="218" y="70" width="4" height="4" fill="#A78BFA" filter="url(#tinyGlow)"/><path d="M300 62L309 72L304 84L290 79L293 67Z" fill="#16213E" stroke="#FF9FD6" stroke-width="2"/><rect x="298" y="70" width="4" height="4" fill="#FF9FD6" filter="url(#tinyGlow)"/>
  <text x="60" y="106" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">기록</text><text x="140" y="106" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">지식</text><text x="220" y="106" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">모습</text><text x="300" y="106" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">공상</text>
</svg>