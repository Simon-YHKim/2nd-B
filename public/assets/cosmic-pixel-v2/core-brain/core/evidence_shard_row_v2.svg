<svg xmlns="http://www.w3.org/2000/svg" width="350" height="78" viewBox="0 0 350 78" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="76" rx="18" fill="#0D1530" fill-opacity="0.78" stroke="#8D98B8" stroke-opacity="0.18"/>
  <path d="M36 28L45 38L40 50L26 45L29 33Z" fill="#16213E" stroke="#FFD166" stroke-width="2"/><rect x="34" y="36" width="4" height="4" fill="#FFD166" filter="url(#tinyGlow)"/>
  <text x="70" y="30" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="700" fill="#FFD166" shape-rendering="geometricPrecision">오늘의 조각</text>
  <text x="70" y="52" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#E8ECF8" shape-rendering="geometricPrecision">앱 세계관을 픽셀 그래프 마을로 바꾸고 싶다</text>
  <rect x="300" y="25" width="28" height="28" rx="10" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.3"/>
  <path d="M309 39H319M314 34V44" stroke="#72F2C7" stroke-width="2"/>
</svg>