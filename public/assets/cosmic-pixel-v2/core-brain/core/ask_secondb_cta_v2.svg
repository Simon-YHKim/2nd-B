<svg xmlns="http://www.w3.org/2000/svg" width="350" height="78" viewBox="0 0 350 78" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="76" rx="24" fill="#A78BFA" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.38"/>
  <rect x="22" y="20" width="38" height="38" rx="13" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.36"/>
  <rect x="34" y="30" width="14" height="16" rx="4" fill="#A78BFA"/>
  <rect x="38" y="36" width="3" height="3" fill="#E8ECF8"/><rect x="44" y="36" width="3" height="3" fill="#E8ECF8"/>
  <text x="78" y="33" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">세컨비에게 이 중심으로 묻기</text>
  <text x="78" y="56" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">선택된 조각과 나의 모습을 먼저 참고해요.</text>
  <path d="M312 32L322 39L312 46" stroke="#72F2C7" stroke-width="3" stroke-linejoin="miter"/>
</svg>