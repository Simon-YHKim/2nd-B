<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" fill="none" shape-rendering="crispEdges">
  <title>Mobile onboarding secondb</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
    <rect width="390" height="844" fill="#070A18"/>
    <circle cx="196" cy="214" r="180" fill="#A78BFA" opacity=".12"/>
    <circle cx="64" cy="620" r="120" fill="#72F2C7" opacity=".06"/>
    <rect x="16" y="18" width="358" height="806" rx="34" fill="none" stroke="#243056" stroke-opacity=".55"/>
    
  <text x="32" y="78" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="22" font-weight="800">세컨비를 만나보세요</text>
  <text x="32" y="106" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">내 조각을 참고해서 대답하는 작은 친구예요.</text>
  <g transform="translate(32 144) scale(.836)">
    <rect width="390" height="220" rx="26" fill="#0D1530" stroke="#243056"/>
    <rect x="56" y="72" width="72" height="66" rx="18" fill="#16213E" stroke="#A78BFA" stroke-width="2"/>
    <rect x="74" y="54" width="36" height="18" rx="5" fill="#243056" stroke="#A78BFA"/>
    <rect x="76" y="98" width="8" height="8" fill="#E8ECF8"/>
    <rect x="104" y="98" width="8" height="8" fill="#E8ECF8"/>
    <rect x="86" y="122" width="16" height="6" fill="#72F2C7"/>
    <circle cx="121" cy="78" r="5" fill="#FFD166"/>
    <text x="166" y="64" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="20" font-weight="700">세컨비</text>
    <text x="166" y="92" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">기록을 찾아보고</text>
    <text x="166" y="114" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">답을 함께 접어줘요</text>
  </g>
  <rect x="32" y="430" width="326" height="54" rx="18" fill="#16213E" stroke="#A78BFA" stroke-opacity=".4"/>
  <text x="54" y="463" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="13">“내 기록으로 다시 생각해볼게.”</text>
  <rect x="32" y="716" width="326" height="52" rx="26" fill="#A78BFA"/>
  <text x="124" y="749" fill="#070A18" font-family="Pretendard, system-ui" font-size="15" font-weight="800">세컨비와 시작</text>

    
</svg>
