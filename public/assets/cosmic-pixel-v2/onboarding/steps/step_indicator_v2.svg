<svg xmlns="http://www.w3.org/2000/svg" width="220" height="54" viewBox="0 0 220 54" fill="none" shape-rendering="crispEdges">
  <title>Step indicator</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="220" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="220" height="54" rx="18" fill="#0D1530" stroke="#243056"/>
  <rect x="16" y="19" width="120" height="16" rx="8" fill="#243056"/>
  <rect x="16" y="19" width="72" height="16" rx="8" fill="#72F2C7"/>
  <text x="150" y="33" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="12">2 / 5</text>

</svg>
