<svg xmlns="http://www.w3.org/2000/svg" width="390" height="260" viewBox="0 0 390 260" fill="none" shape-rendering="crispEdges">
  <title>Graph village intro</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="390" height="260" rx="28" fill="#070A18"/>
  <circle cx="195" cy="124" r="96" fill="url(#mintGlow)"/>
  <g stroke="#243056" stroke-width="4" stroke-linecap="round">
    <path d="M195 120 L95 84 L120 182 L195 120 L290 80 L270 184 L195 120"/>
    <path d="M120 182 L270 184"/>
  </g>
  <g stroke="#72F2C7" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 9">
    <path d="M195 120 L95 84 L120 182"/>
    <path d="M195 120 L290 80 L270 184"/>
  </g>
  <rect x="165" y="90" width="60" height="60" rx="18" fill="#16213E" stroke="#A78BFA" stroke-width="2"/>
  <circle cx="195" cy="120" r="14" fill="#A78BFA"/>
  <circle cx="95" cy="84" r="20" fill="#16213E" stroke="#4CC9F0" stroke-width="2"/>
  <circle cx="120" cy="182" r="20" fill="#16213E" stroke="#FFD166" stroke-width="2"/>
  <circle cx="290" cy="80" r="20" fill="#16213E" stroke="#72F2C7" stroke-width="2"/>
  <circle cx="270" cy="184" r="20" fill="#16213E" stroke="#FF9FD6" stroke-width="2"/>
  <rect x="92" y="214" width="206" height="26" rx="13" fill="#0D1530" stroke="#243056"/>
  <text x="106" y="232" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="12">노드는 장소, 연결선은 길이에요</text>

</svg>
