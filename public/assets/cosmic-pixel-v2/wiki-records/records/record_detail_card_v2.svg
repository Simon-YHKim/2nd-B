<svg xmlns="http://www.w3.org/2000/svg" width="350" height="230" viewBox="0 0 350 230" fill="none" shape-rendering="crispEdges">
  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="screenBg" cx="50%" cy="28%" r="86%"><stop offset="0" stop-color="#72F2C7" stop-opacity="0.10"/><stop offset="34%" stop-color="#A78BFA" stop-opacity="0.10"/><stop offset="74%" stop-color="#0D1530" stop-opacity="0.92"/><stop offset="100%" stop-color="#070A18"/></radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="58%"><stop offset="0" stop-color="#72F2C7" stop-opacity="0.68"/><stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/></radialGradient>
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="58%"><stop offset="0" stop-color="#A78BFA" stop-opacity="0.64"/><stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/></radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="58%"><stop offset="0" stop-color="#FFD166" stop-opacity="0.72"/><stop offset="100%" stop-color="#FFD166" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/><stop offset="1" stop-color="#16213E" stop-opacity="0.88"/></linearGradient>
    <linearGradient id="shardPanel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16213E" stop-opacity="0.94"/><stop offset="0.68" stop-color="#0D1530" stop-opacity="0.96"/><stop offset="1" stop-color="#72F2C7" stop-opacity="0.15"/></linearGradient>
    
  </defs>
  <rect x="1" y="1" width="348" height="228" rx="28" fill="url(#panel)" stroke="#FFD166" stroke-opacity="0.28"/>
  <g transform="translate(56 58) scale(1.1)" opacity="1">
      <path d="M0 -13L12 -2L6 13L-10 9L-8 -6Z" fill="#16213E" stroke="#FFD166" stroke-width="2"/>
      <rect x="-2" y="-2" width="4" height="4" fill="#FFD166" filter="url(#tinyGlow)"/>
    </g>
  <text x="100" y="48" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#FFD166" shape-rendering="geometricPrecision">오늘의 조각</text>
  <text x="100" y="76" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">모바일 그래프에서 연결이 잘 보이는 구조</text>
  <rect x="24" y="112" width="302" height="74" rx="18" fill="#070A18" fill-opacity="0.35" stroke="#8D98B8" stroke-opacity="0.18"/>
  <text x="44" y="140" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">저장된 원문 일부가 여기에 보여요.</text>
  <text x="44" y="162" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">너무 길면 접고, 상세에서 전체를 열어요.</text>
  <rect x="24" y="200" width="82" height="18" rx="9" fill="#243056" opacity="0.60"/><text x="65" y="213" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#8D98B8" shape-rendering="geometricPrecision">journal</text>
  <rect x="116" y="200" width="86" height="18" rx="9" fill="#72F2C7" fill-opacity="0.13"/><text x="159" y="213" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">2 연결</text>
</svg>