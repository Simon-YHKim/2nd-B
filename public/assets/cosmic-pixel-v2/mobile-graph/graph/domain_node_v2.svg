<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="violetCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E"/>
      <stop offset="1" stop-color="#0D1530"/>
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="42" fill="url(#mintGlow)" opacity="0.28"/>
  <path d="M24 56 L48 30 L72 56 V76 H24 Z" fill="url(#nodeSurface)" stroke="#4CC9F0" stroke-opacity="0.55" stroke-width="2"/>
  <rect x="34" y="60" width="12" height="16" fill="#243056"/>
  <rect x="52" y="60" width="10" height="10" fill="#72F2C7" opacity="0.72"/>
  <rect x="45" y="24" width="6" height="6" fill="#FFD166" filter="url(#tinyGlow)"/>
  <path d="M16 48 H8 M80 48 H88 M48 84 V92" stroke="#72F2C7" stroke-width="2" opacity="0.42"/>
  <rect x="7" y="47" width="4" height="4" fill="#72F2C7"/>
  <rect x="85" y="47" width="4" height="4" fill="#72F2C7"/>
</svg>