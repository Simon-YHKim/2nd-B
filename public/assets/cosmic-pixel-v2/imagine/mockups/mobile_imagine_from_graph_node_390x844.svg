<rect width="390" height="844" fill="url(#bg)"/><rect x="22" y="118" width="2" height="2" fill="#8D98B8" opacity="0.48"/><rect x="340" y="126" width="2" height="2" fill="#72F2C7" opacity="0.48"/><rect x="78" y="238" width="2" height="2" fill="#A78BFA" opacity="0.48"/><rect x="320" y="330" width="2" height="2" fill="#FFD166" opacity="0.48"/><rect x="42" y="592" width="2" height="2" fill="#72F2C7" opacity="0.48"/><rect x="355" y="642" width="2" height="2" fill="#8D98B8" opacity="0.48"/><rect x="116" y="760" width="2" height="2" fill="#FFD166" opacity="0.48"/><rect x="244" y="204" width="2" height="2" fill="#8D98B8" opacity="0.48"/><rect x="182" y="618" width="2" height="2" fill="#FF9FD6" opacity="0.48"/><rect x="32" y="410" width="2" height="2" fill="#FF9FD6" opacity="0.48"/><rect x="350" y="520" width="2" height="2" fill="#4CC9F0" opacity="0.48"/>

  <rect x="16" y="50" width="44" height="44" rx="14" fill="#0D1530" stroke="#8D98B8" stroke-opacity="0.28"/>
  <path d="M42 62L32 72L42 82" stroke="#E8ECF8" stroke-width="3"/>
  <text x="78" y="72" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">공상 작업실</text>
  <text x="78" y="96" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">선택한 노드에서 생각을 펼쳐봐요.</text>
  <rect x="336" y="54" width="38" height="38" rx="13" fill="#0D1530" stroke="#FF9FD6" stroke-opacity="0.32"/>
  <path d="M355 62L359 72L369 76L359 80L355 90L351 80L341 76L351 72Z" fill="#FF9FD6" opacity="0.88"/>

  <rect x="20" y="124" width="350" height="76" rx="22" fill="#72F2C7" fill-opacity="0.10" stroke="#72F2C7" stroke-opacity="0.30"/>
  <g transform="translate(48 162) scale(0.78)"><path d="M0 -12L11 -1L5 13L-10 8L-7 -6Z" fill="#16213E" stroke="#72F2C7" stroke-width="2"/><rect x="-2" y="-2" width="4" height="4" fill="#72F2C7" filter="url(#tinyGlow)"/></g>
  <text x="78" y="152" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#72F2C7" shape-rendering="geometricPrecision">만드는 나에서 시작</text>
  <text x="78" y="176" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">선택한 노드와 연결된 조각을 먼저 참고해요.</text>
  <rect x="20" y="232" width="350" height="202" rx="26" fill="#0D1530" fill-opacity="0.78" stroke="#FF9FD6" stroke-opacity="0.26"/>
  <text x="42" y="270" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">이 노드로 무엇을 펼칠까요?</text>
  <rect x="42" y="294" width="306" height="84" rx="18" fill="#070A18" fill-opacity="0.36" stroke="#8D98B8" stroke-opacity="0.18"/>
  <text x="62" y="330" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">예: 만드는 나를 캐릭터로 바꿔줘</text>
  <text x="62" y="358" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">예: 이 모습으로 앱 첫 장면 만들기</text>
  <rect x="42" y="392" width="152" height="28" rx="12" fill="#A78BFA" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.3"/><text x="118" y="411" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">연결 조각 23개</text>
  <rect x="20" y="462" width="350" height="110" rx="22" fill="#0D1530" fill-opacity="0.78" stroke="#A78BFA" stroke-opacity="0.18"/>
  <text x="40" y="498" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#A78BFA" shape-rendering="geometricPrecision">벨라 힌트</text>
  <text x="40" y="526" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#E8ECF8" shape-rendering="geometricPrecision">장면, 캐릭터, 물건 중 하나만 말해도 좋아요.</text>
  <rect x="20" y="606" width="350" height="58" rx="22" fill="#FF9FD6" fill-opacity="0.17" stroke="#FF9FD6" stroke-opacity="0.42"/><text x="195" y="642" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#E8ECF8" shape-rendering="geometricPrecision">이 노드로 펼치기</text>
</svg>