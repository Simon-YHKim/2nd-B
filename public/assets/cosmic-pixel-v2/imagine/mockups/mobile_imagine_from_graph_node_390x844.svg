    <filter id="smallGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg" cx="50%" cy="30%" r="78%"><stop offset="0" stop-color="#FF9FD6" stop-opacity="0.15"/><stop offset="34%" stop-color="#A78BFA" stop-opacity="0.10"/><stop offset="62%" stop-color="#0D1530" stop-opacity="0.88"/><stop offset="100%" stop-color="#070A18"/></radialGradient>
    <radialGradient id="dreamGlow" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="#FF9FD6" stop-opacity="0.72"/><stop offset="52%" stop-color="#A78BFA" stop-opacity="0.26"/><stop offset="100%" stop-color="#FF9FD6" stop-opacity="0"/></radialGradient>
