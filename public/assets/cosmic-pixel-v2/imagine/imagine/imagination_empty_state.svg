<svg xmlns="http://www.w3.org/2000/svg" width="350" height="250" viewBox="0 0 350 250" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dreamGlow" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FF9FD6" stop-opacity="0.76"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF9FD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="dreamPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="248" rx="30" fill="url(#dreamPanel)" stroke="#FF9FD6" stroke-opacity="0.24"/>
  <circle cx="175" cy="94" r="72" fill="url(#dreamGlow)" opacity="0.55"/>
  <g transform="translate(175 96) scale(0.62)">
      <circle cx="0" cy="2" r="48" fill="url(#dreamGlow)" opacity="0.72"/>
      <rect x="-26" y="-12" width="52" height="44" rx="14" fill="#16213E" stroke="#FF9FD6" stroke-opacity="0.58"/>
      <rect x="-18" y="-26" width="36" height="16" rx="6" fill="#A78BFA" stroke="#FF9FD6" stroke-opacity="0.44"/>
      <rect x="-4" y="-42" width="8" height="16" fill="#FF9FD6" filter="url(#tinyGlow)"/>
      <rect x="-2" y="-54" width="4" height="10" fill="#FFD166" filter="url(#tinyGlow)"/>
      <rect x="-14" y="2" width="5" height="5" fill="#E8ECF8"/>
      <rect x="9" y="2" width="5" height="5" fill="#E8ECF8"/>
      <rect x="-8" y="18" width="16" height="4" fill="#72F2C7"/>
      <path d="M-32 8L-48 -2L-38 26Z" fill="#A78BFA" opacity="0.62" stroke="#FF9FD6" stroke-opacity="0.44"/>
      <path d="M32 8L48 -2L38 26Z" fill="#A78BFA" opacity="0.62" stroke="#FF9FD6" stroke-opacity="0.44"/>
      <rect x="-18" y="34" width="10" height="8" fill="#243056"/>
      <rect x="8" y="34" width="10" height="8" fill="#243056"/>
    </g>
  <text x="175" y="178" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">아직 공상 조각이 없어요</text>
  <text x="175" y="206" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">떠오른 장면을 하나만 던져주세요.</text>
  <text x="175" y="228" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">벨라가 다음 한 걸음으로 접어볼게요.</text>
</svg>