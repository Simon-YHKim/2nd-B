<svg xmlns="http://www.w3.org/2000/svg" width="350" height="196" viewBox="0 0 350 196" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dreamGlow" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FF9FD6" stop-opacity="0.76"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF9FD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="dreamPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="194" rx="26" fill="url(#dreamPanel)" stroke="#FF9FD6" stroke-opacity="0.28"/>
  <rect x="22" y="22" width="46" height="46" rx="16" fill="#FF9FD6" fill-opacity="0.15" stroke="#FF9FD6" stroke-opacity="0.38"/>
  <path d="M45 30L49 42L61 46L49 50L45 62L41 50L29 46L41 42Z" fill="#FF9FD6"/>
  <text x="84" y="38" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">생각을 던져보세요</text>
  <text x="84" y="62" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">아직 말이 안 되어도 괜찮아요.</text>
  <rect x="22" y="88" width="306" height="74" rx="18" fill="#070A18" fill-opacity="0.36" stroke="#8D98B8" stroke-opacity="0.18"/>
  <text x="42" y="120" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">예: 조각마을의 첫 장면을 만들고 싶어</text>
  <text x="42" y="146" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">예: 세컨비가 기록을 정리하는 애니메이션</text>
</svg>