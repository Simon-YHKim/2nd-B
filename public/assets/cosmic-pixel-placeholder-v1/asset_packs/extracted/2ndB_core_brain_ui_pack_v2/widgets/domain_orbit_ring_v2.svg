<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <circle cx="130" cy="130" r="104" fill="url(#coreGlow)" opacity="0.24"/>
  <circle cx="130" cy="130" r="92" stroke="#243056" stroke-width="3"/>
  <circle cx="130" cy="130" r="64" stroke="#72F2C7" stroke-opacity="0.32" stroke-width="2" stroke-dasharray="8 8"/>
  <g transform="translate(130 130) scale(0.68)">
      <circle cx="0" cy="0" r="48" fill="url(#coreGlow)" opacity="0.8"/>
      <rect x="-32" y="22" width="64" height="10" fill="#243056" opacity="0.95"/>
      <rect x="-24" y="10" width="48" height="14" fill="#16213E" stroke="#A78BFA" stroke-opacity="0.45"/>
      <rect x="-17" y="-12" width="34" height="22" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.45"/>
      <rect x="-7" y="-30" width="14" height="18" fill="#A78BFA" filter="url(#tinyGlow)"/>
      <rect x="-2" y="-44" width="4" height="12" fill="#FFD166" filter="url(#tinyGlow)"/>
      <rect x="-11" y="-4" width="5" height="5" fill="#E8ECF8" opacity="0.9"/>
      <rect x="6" y="-4" width="5" height="5" fill="#E8ECF8" opacity="0.9"/>
      <rect x="-5" y="8" width="10" height="4" fill="#72F2C7"/>
    </g>
  <rect x="32" y="70" width="46" height="46" rx="16" fill="#16213E" stroke="#4CC9F0" stroke-opacity="0.5"/>
  <rect x="185" y="66" width="46" height="46" rx="16" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.5"/>
  <rect x="54" y="186" width="46" height="46" rx="16" fill="#16213E" stroke="#FFD166" stroke-opacity="0.5"/>
  <rect x="170" y="188" width="46" height="46" rx="16" fill="#16213E" stroke="#FF9FD6" stroke-opacity="0.5"/>
</svg>