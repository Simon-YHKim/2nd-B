<svg xmlns="http://www.w3.org/2000/svg" width="300" height="132" viewBox="0 0 300 132" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="284" height="116" rx="24" fill="#0D1530" fill-opacity="0.78" stroke="#8D98B8" stroke-opacity="0.18"/>
  <rect x="24" y="30" width="88" height="34" rx="14" fill="#A78BFA" opacity="0.18" stroke="#A78BFA" stroke-opacity="0.38"/><text x="68" y="52" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">만드는 나</text>
  <rect x="124" y="30" width="88" height="34" rx="14" fill="#72F2C7" opacity="0.13" stroke="#72F2C7" stroke-opacity="0.38"/><text x="168" y="52" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">정리하는 나</text>
  <rect x="64" y="78" width="88" height="34" rx="14" fill="#FFD166" opacity="0.13" stroke="#FFD166" stroke-opacity="0.38"/><text x="108" y="100" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">배우는 나</text>
  <rect x="164" y="78" width="88" height="34" rx="14" fill="#FF9FD6" opacity="0.13" stroke="#FF9FD6" stroke-opacity="0.38"/><text x="208" y="100" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">펼치는 나</text>
</svg>