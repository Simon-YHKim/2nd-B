<svg xmlns="http://www.w3.org/2000/svg" width="390" height="104" viewBox="0 0 390 104" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="390" height="104" fill="transparent"/>
  <rect x="16" y="24" width="44" height="44" rx="14" fill="#0D1530" stroke="#8D98B8" stroke-opacity="0.28"/>
  <path d="M42 36L32 46L42 56" stroke="#E8ECF8" stroke-width="3" stroke-linejoin="miter"/>
  <text x="78" y="49" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">나의 중심</text>
  <text x="78" y="75" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">요즘 자주 이어지는 조각들을 살펴봐요.</text>
  <rect x="336" y="28" width="38" height="38" rx="13" fill="#0D1530" stroke="#72F2C7" stroke-opacity="0.26"/>
  <path d="M348 47H362M355 40V54" stroke="#72F2C7" stroke-width="2"/>
</svg>