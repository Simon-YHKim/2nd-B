<svg xmlns="http://www.w3.org/2000/svg" width="350" height="96" viewBox="0 0 350 96" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="94" rx="22" fill="#72F2C7" fill-opacity="0.1" stroke="#72F2C7" stroke-opacity="0.32"/>
  <rect x="20" y="24" width="42" height="42" rx="14" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.4"/>
  <path d="M31 45H51M45 39L51 45L45 51" stroke="#72F2C7" stroke-width="3" stroke-linejoin="miter"/>
  <text x="78" y="36" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">다음 한 걸음</text>
  <text x="78" y="62" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">이 중심을 공상 작업실에서 한 장면으로 펼쳐보기</text>
</svg>