    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
