<svg xmlns="http://www.w3.org/2000/svg" width="350" height="88" viewBox="0 0 350 88" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="86" rx="22" fill="url(#card)" stroke="#8D98B8" stroke-opacity="0.18"/>
  <text x="22" y="30" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">중심 밝기</text>
  <text x="302" y="30" text-anchor="middle" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="700" fill="#FFD166" shape-rendering="geometricPrecision">일출</text>
  <rect x="22" y="48" width="306" height="10" rx="5" fill="#243056" opacity="0.72"/>
  <rect x="22" y="48" width="184" height="10" rx="5" fill="#FFD166" opacity="0.92"/>
  <rect x="22" y="44" width="4" height="18" fill="#8D98B8" opacity="0.45"/>
  <rect x="102" y="44" width="4" height="18" fill="#8D98B8" opacity="0.45"/>
  <rect x="202" y="42" width="5" height="22" fill="#FFD166" filter="url(#tinyGlow)"/>
  <rect x="324" y="44" width="4" height="18" fill="#8D98B8" opacity="0.45"/>
</svg>