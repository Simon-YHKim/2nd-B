<svg xmlns="http://www.w3.org/2000/svg" width="350" height="122" viewBox="0 0 350 122" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0D1530" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="120" rx="22" fill="url(#card)" stroke="#72F2C7" stroke-opacity="0.27"/>
  <rect x="22" y="22" width="44" height="44" rx="14" fill="#72F2C7" fill-opacity="0.14" stroke="#72F2C7" stroke-opacity="0.4"/>
  <path d="M33 44H55M44 33V55" stroke="#72F2C7" stroke-width="3"/>
  <text x="82" y="35" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">요즘 가장 밝은 연결</text>
  <text x="82" y="62" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" font-weight="700" fill="#FFD166" shape-rendering="geometricPrecision">공상 작업실 · 지식 창고 · 만드는 나</text>
  <text x="82" y="91" text-anchor="start" font-family="NanumGothic, Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">최근 기록들이 아이디어를 구체화하는 쪽으로 이어졌어요.</text>
</svg>