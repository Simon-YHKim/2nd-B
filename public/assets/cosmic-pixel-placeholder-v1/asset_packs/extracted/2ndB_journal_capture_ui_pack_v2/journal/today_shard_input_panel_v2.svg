<svg xmlns="http://www.w3.org/2000/svg" width="350" height="230" viewBox="0 0 350 230" fill="none" shape-rendering="crispEdges" >
  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="bg" cx="50%" cy="28%" r="78%"><stop offset="0" stop-color="#72F2C7" stop-opacity="0.10"/><stop offset="35%" stop-color="#A78BFA" stop-opacity="0.08"/><stop offset="65%" stop-color="#0D1530" stop-opacity="0.86"/><stop offset="100%" stop-color="#070A18"/></radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="#FFD166" stop-opacity="0.74"/><stop offset="50%" stop-color="#FFD166" stop-opacity="0.22"/><stop offset="100%" stop-color="#FFD166" stop-opacity="0"/></radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="#72F2C7" stop-opacity="0.74"/><stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/><stop offset="1" stop-color="#16213E" stop-opacity="0.90"/></linearGradient>
    <linearGradient id="entryPanel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16213E" stop-opacity="0.92"/><stop offset="0.55" stop-color="#0D1530" stop-opacity="0.98"/><stop offset="1" stop-color="#72F2C7" stop-opacity="0.11"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="348" height="228" rx="28" fill="url(#entryPanel)" stroke="#FFD166" stroke-opacity="0.26"/>
  <rect x="22" y="22" width="48" height="48" rx="16" fill="#FFD166" fill-opacity="0.13" stroke="#FFD166" stroke-opacity="0.36"/>
  <g transform="translate(46 46) scale(0.85)"><path d="M0 -13L12 -2L6 13L-10 8L-7 -7Z" fill="#16213E" stroke="#FFD166" stroke-width="2"/><rect x="-2" y="-2" width="4" height="4" fill="#FFD166" filter="url(#tinyGlow)"/></g>
  <text x="86" y="40" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">오늘 머릿속에 남은 조각</text>
  <text x="86" y="64" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">한 문장이어도 충분해요.</text>
  <rect x="22" y="92" width="306" height="92" rx="20" fill="#070A18" fill-opacity="0.32" stroke="#8D98B8" stroke-opacity="0.18"/>
  <text x="42" y="126" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">예: 오늘 이 아이디어가 계속 떠올랐어</text>
  <text x="42" y="152" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">예: 나는 복잡한 걸 보기 쉽게 만들고 싶어</text>
  <rect x="22" y="198" width="78" height="20" rx="9" fill="#243056" fill-opacity="0.58"/><text x="61" y="212" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#8D98B8" shape-rendering="geometricPrecision">비공개</text>
  <rect x="112" y="198" width="100" height="20" rx="9" fill="#FFD166" fill-opacity="0.15" stroke="#FFD166" stroke-opacity="0.24"/><text x="162" y="212" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">나중에 연결됨</text>
</svg>