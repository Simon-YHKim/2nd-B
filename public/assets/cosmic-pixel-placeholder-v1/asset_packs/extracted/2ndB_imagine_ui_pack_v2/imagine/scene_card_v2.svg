<svg xmlns="http://www.w3.org/2000/svg" width="350" height="176" viewBox="0 0 350 176" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dreamGlow" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FF9FD6" stop-opacity="0.76"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF9FD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="dreamPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="348" height="174" rx="26" fill="url(#dreamPanel)" stroke="#FF9FD6" stroke-opacity="0.28"/>
  <rect x="20" y="22" width="92" height="96" rx="18" fill="#070A18" fill-opacity="0.34" stroke="#FF9FD6" stroke-opacity="0.26"/>
  <rect x="36" y="80" width="60" height="24" rx="8" fill="#16213E" stroke="#72F2C7" stroke-opacity="0.36"/>
  <rect x="53" y="54" width="26" height="28" rx="8" fill="#A78BFA"/>
  <rect x="61" y="64" width="4" height="4" fill="#E8ECF8"/><rect x="70" y="64" width="4" height="4" fill="#E8ECF8"/>
  <g transform="translate(96 48) scale(0.7)"><path d="M0 -12L11 -1L5 13L-10 8L-7 -6Z" fill="#16213E" stroke="#FFD166" stroke-width="2"/><rect x="-2" y="-2" width="4" height="4" fill="#FFD166" filter="url(#tinyGlow)"/></g>
  <text x="132" y="36" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#FF9FD6" shape-rendering="geometricPrecision">장면 1</text>
  <text x="132" y="62" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">밤빛 그래프 마을의 첫 불빛</text>
  <text x="132" y="90" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">세컨비가 작은 조각을 들고 중심 길로 걸어가요.</text>
  <text x="132" y="116" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">그 순간 연결선 하나가 민트빛으로 켜져요.</text>
  <rect x="132" y="134" width="78" height="24" rx="10" fill="#FF9FD6" opacity="0.16" stroke="#FF9FD6" stroke-opacity="0.3"/><text x="171" y="151" text-anchor="middle" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">scene</text>
</svg>