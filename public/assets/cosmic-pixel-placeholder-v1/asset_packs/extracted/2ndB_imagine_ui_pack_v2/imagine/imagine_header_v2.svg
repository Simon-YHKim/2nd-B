  <text x="78" y="75" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">생각을 장면으로 펼치고 다음 한 걸음으로 접어요.</text>
