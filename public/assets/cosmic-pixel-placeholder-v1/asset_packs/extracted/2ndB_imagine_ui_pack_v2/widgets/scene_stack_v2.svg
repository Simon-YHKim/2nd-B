<svg xmlns="http://www.w3.org/2000/svg" width="300" height="210" viewBox="0 0 300 210" fill="none" shape-rendering="crispEdges" >

  <defs>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dreamGlow" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FF9FD6" stop-opacity="0.76"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF9FD6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#72F2C7" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#16213E" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="dreamPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16213E" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#0D1530" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <rect x="24" y="34" width="218" height="120" rx="22" fill="#16213E" stroke="#243056"/>
  <rect x="42" y="24" width="218" height="120" rx="22" fill="#0D1530" stroke="#A78BFA" stroke-opacity="0.3"/>
  <rect x="60" y="14" width="218" height="120" rx="22" fill="url(#dreamPanel)" stroke="#FF9FD6" stroke-opacity="0.36"/>
  <text x="82" y="54" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#E8ECF8" shape-rendering="geometricPrecision">장면 카드</text>
  <text x="82" y="82" text-anchor="start" font-family="Pretendard, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#8D98B8" shape-rendering="geometricPrecision">공상 조각이 그림처럼 정리돼요.</text>
  <rect x="82" y="104" width="78" height="20" rx="8" fill="#FF9FD6" opacity="0.18" stroke="#FF9FD6" stroke-opacity="0.3"/>
  <rect x="170" y="104" width="78" height="20" rx="8" fill="#72F2C7" opacity="0.14" stroke="#72F2C7" stroke-opacity="0.3"/>
</svg>