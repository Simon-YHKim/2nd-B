<svg xmlns="http://www.w3.org/2000/svg" width="390" height="260" viewBox="0 0 390 260" fill="none" shape-rendering="crispEdges">
  <title>First run empty graph state</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="390" height="260" rx="28" fill="#070A18"/>
  <circle cx="195" cy="126" r="90" fill="url(#violetGlow)"/>
  <g stroke="#243056" stroke-width="3" stroke-linecap="round" opacity=".8">
    <path d="M195 126 L120 86 M195 126 L270 86 M195 126 L120 180 M195 126 L270 180"/>
  </g>
  <rect x="167" y="98" width="56" height="56" rx="18" fill="#16213E" stroke="#A78BFA"/>
  <circle cx="120" cy="86" r="16" fill="#0D1530" stroke="#243056"/>
  <circle cx="270" cy="86" r="16" fill="#0D1530" stroke="#243056"/>
  <circle cx="120" cy="180" r="16" fill="#0D1530" stroke="#243056"/>
  <circle cx="270" cy="180" r="16" fill="#0D1530" stroke="#243056"/>
  <text x="78" y="232" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">첫 조각을 남기면 길이 조금씩 켜져요</text>

</svg>
