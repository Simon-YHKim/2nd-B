<svg xmlns="http://www.w3.org/2000/svg" width="390" height="210" viewBox="0 0 390 210" fill="none" shape-rendering="crispEdges">
  <title>Privacy trust card</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="390" height="210" rx="26" fill="#0D1530" stroke="#243056"/>
  <rect x="24" y="28" width="54" height="54" rx="18" fill="#16213E" stroke="#4CC9F0"/>
  <path d="M40 52v-8c0-12 22-12 22 0v8" stroke="#4CC9F0" stroke-width="3" stroke-linecap="round"/>
  <rect x="36" y="52" width="30" height="22" rx="4" fill="#070A18" stroke="#4CC9F0"/>
  <text x="96" y="48" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="18" font-weight="700">내 조각은 조심히 다뤄요</text>
  <text x="96" y="74" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="12">저장, 참고, 연결되는 흐름을 화면에서 보여줘요.</text>
  <rect x="24" y="108" width="342" height="34" rx="17" fill="#16213E"/>
  <text x="44" y="130" fill="#72F2C7" font-family="Pretendard, system-ui" font-size="12">답변 아래에는 ‘참고한 조각’을 표시해요</text>
  <rect x="24" y="152" width="342" height="34" rx="17" fill="#16213E"/>
  <text x="44" y="174" fill="#FFD166" font-family="Pretendard, system-ui" font-size="12">언제든 조각 기록과 지식 창고에서 다시 볼 수 있어요</text>

</svg>
