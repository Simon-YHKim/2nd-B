<svg xmlns="http://www.w3.org/2000/svg" width="180" height="32" viewBox="0 0 180 32" fill="none" shape-rendering="crispEdges">
  <title>Progress dots</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="180" height="32" rx="16" fill="#0D1530"/>
  <circle cx="38" cy="16" r="6" fill="#A78BFA"/>
  <circle cx="64" cy="16" r="5" fill="#243056" stroke="#8D98B8"/>
  <circle cx="90" cy="16" r="5" fill="#243056" stroke="#8D98B8"/>
  <circle cx="116" cy="16" r="5" fill="#243056" stroke="#8D98B8"/>
  <circle cx="142" cy="16" r="5" fill="#243056" stroke="#8D98B8"/>

</svg>
