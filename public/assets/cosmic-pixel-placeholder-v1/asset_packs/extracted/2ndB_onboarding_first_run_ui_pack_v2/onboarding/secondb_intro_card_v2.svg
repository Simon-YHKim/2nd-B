<svg xmlns="http://www.w3.org/2000/svg" width="390" height="220" viewBox="0 0 390 220" fill="none" shape-rendering="crispEdges">
  <title>SecondB intro card</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A18"/>
      <stop offset="0.62" stop-color="#0D1530"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="38%" r="55%">
      <stop stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#72F2C7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#72F2C7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="390" height="220" rx="26" fill="#0D1530" stroke="#243056"/>
  <circle cx="92" cy="106" r="54" fill="#A78BFA" opacity=".13"/>
  <rect x="56" y="72" width="72" height="66" rx="18" fill="#16213E" stroke="#A78BFA" stroke-width="2"/>
  <rect x="74" y="54" width="36" height="18" rx="5" fill="#243056" stroke="#A78BFA"/>
  <rect x="76" y="98" width="8" height="8" fill="#E8ECF8"/>
  <rect x="104" y="98" width="8" height="8" fill="#E8ECF8"/>
  <rect x="86" y="122" width="16" height="6" fill="#72F2C7"/>
  <circle cx="121" cy="78" r="5" fill="#FFD166"/>
  <text x="166" y="64" fill="#E8ECF8" font-family="Pretendard, system-ui" font-size="20" font-weight="700">세컨비</text>
  <text x="166" y="92" fill="#8D98B8" font-family="Pretendard, system-ui" font-size="13">내 조각을 참고해서 대답하는 작은 AI 친구</text>
  <rect x="166" y="118" width="150" height="28" rx="14" fill="#16213E" stroke="#72F2C7" stroke-opacity=".55"/>
  <text x="181" y="137" fill="#72F2C7" font-family="Pretendard, system-ui" font-size="12">내 기록으로 답해줘</text>
  <rect x="166" y="154" width="128" height="28" rx="14" fill="#16213E" stroke="#FFD166" stroke-opacity=".55"/>
  <text x="181" y="173" fill="#FFD166" font-family="Pretendard, system-ui" font-size="12">다음 한 걸음</text>

</svg>
