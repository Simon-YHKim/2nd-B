<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2ndB SecondB Chat UI Pack v2</title>
<style>
  :root { --space-950:#070A18; --space-900:#0D1530; --space-800:#16213E; --mint:#72F2C7; --violet:#A78BFA; --lamp:#FFD166; --white:#E8ECF8; --gray:#8D98B8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: 'Noto Sans CJK KR', system-ui, sans-serif; background: radial-gradient(circle at 50% 0%, rgba(167,139,250,.18), transparent 32%), var(--space-950); color: var(--white); }
  header { padding: 42px 24px 18px; max-width: 1160px; margin: 0 auto; }
  h1 { margin:0; font-size: clamp(28px, 4vw, 48px); }
  p { color: var(--gray); line-height: 1.7; }
  section { max-width: 1160px; margin: 0 auto; padding: 24px; }
  h2 { margin: 0 0 18px; font-size: 24px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; }
  .mock-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 22px; align-items:start; }
  figure { margin:0; padding: 14px; border:1px solid rgba(141,152,184,.22); border-radius: 22px; background: rgba(13,21,48,.72); }
  figure img { display:block; width:100%; height:auto; border-radius: 14px; }
  figcaption { margin-top:10px; color: var(--gray); font-size: 12px; word-break: break-all; }
  .icon img { width:48px; height:48px; image-rendering:pixelated; margin: 0 auto; }
  .icon figcaption { text-align:center; }
  .palette { display:flex; gap:10px; flex-wrap:wrap; }
  .swatch { width:124px; padding:16px; border-radius:16px; border:1px solid rgba(255,255,255,.12); background:var(--c); color: #E8ECF8; text-shadow:0 1px 6px rgba(0,0,0,.6); font-size:12px; }
  code { color: var(--mint); }
</style>
</head>
<body>
<header>
  <h1>2ndB SecondB Chat UI Pack v2</h1>
  <p>세컨비 대화를 일반 챗봇이 아니라 <strong>내 조각을 참고하는 대화 화면</strong>으로 보이게 만드는 모바일 UI 자산 패키지.</p>
  <div class="palette">
    <div class="swatch" style="--c:#070A18">Deep Space<br>#070A18</div>
    <div class="swatch" style="--c:#A78BFA">Soul Violet<br>#A78BFA</div>
    <div class="swatch" style="--c:#72F2C7">Signal Mint<br>#72F2C7</div>
    <div class="swatch" style="--c:#FFD166; color:#1b1603; text-shadow:none;">Pixel Lamp<br>#FFD166</div>
  </div>
</header>
<section>
  <h2>Mobile Mockups</h2>
  <div class="mock-grid"><figure><img src="mockups/mobile_chat_answer_with_sources_390x844.svg"/><figcaption>mobile_chat_answer_with_sources_390x844.svg</figcaption></figure><figure><img src="mockups/mobile_chat_home_390x844.svg"/><figcaption>mobile_chat_home_390x844.svg</figcaption></figure><figure><img src="mockups/mobile_chat_reference_drawer_390x844.svg"/><figcaption>mobile_chat_reference_drawer_390x844.svg</figcaption></figure><figure><img src="mockups/mobile_chat_thinking_390x844.svg"/><figcaption>mobile_chat_thinking_390x844.svg</figcaption></figure><figure><img src="mockups/mobile_node_to_chat_390x844.svg"/><figcaption>mobile_node_to_chat_390x844.svg</figcaption></figure></div>
</section>
<section>
  <h2>Chat Components</h2>
  <div class="grid"><figure><img src="chat/answer_grounding_badge_v2.svg"/><figcaption>answer_grounding_badge_v2.svg</figcaption></figure><figure><img src="chat/chat_header_v2.svg"/><figcaption>chat_header_v2.svg</figcaption></figure><figure><img src="chat/chat_ready_empty_state.svg"/><figcaption>chat_ready_empty_state.svg</figcaption></figure><figure><img src="chat/context_pill_v2.svg"/><figcaption>context_pill_v2.svg</figcaption></figure><figure><img src="chat/input_bar_v2.svg"/><figcaption>input_bar_v2.svg</figcaption></figure><figure><img src="chat/message_bubble_secondb_v2.svg"/><figcaption>message_bubble_secondb_v2.svg</figcaption></figure><figure><img src="chat/message_bubble_user_v2.svg"/><figcaption>message_bubble_user_v2.svg</figcaption></figure><figure><img src="chat/quick_action_chip_v2.svg"/><figcaption>quick_action_chip_v2.svg</figcaption></figure><figure><img src="chat/reference_shard_card_v2.svg"/><figcaption>reference_shard_card_v2.svg</figcaption></figure><figure><img src="chat/secondb_avatar_badge_v2.svg"/><figcaption>secondb_avatar_badge_v2.svg</figcaption></figure><figure><img src="chat/source_trace_panel_v2.svg"/><figcaption>source_trace_panel_v2.svg</figcaption></figure><figure><img src="chat/thinking_bubble_v2.svg"/><figcaption>thinking_bubble_v2.svg</figcaption></figure><figure><img src="chat/typing_dots.svg"/><figcaption>typing_dots.svg</figcaption></figure><figure><img src="chat/user_avatar_badge_v2.svg"/><figcaption>user_avatar_badge_v2.svg</figcaption></figure></div>
</section>
<section>
  <h2>Icons</h2>
  <div class="grid"><figure class="icon"><img src="icons/ask_again.svg"/><figcaption>ask_again</figcaption></figure><figure class="icon"><img src="icons/persona_link.svg"/><figcaption>persona_link</figcaption></figure><figure class="icon"><img src="icons/pin_to_wiki.svg"/><figcaption>pin_to_wiki</figcaption></figure><figure class="icon"><img src="icons/recent_record.svg"/><figcaption>recent_record</figcaption></figure><figure class="icon"><img src="icons/referenced_shard.svg"/><figcaption>referenced_shard</figcaption></figure><figure class="icon"><img src="icons/save_answer.svg"/><figcaption>save_answer</figcaption></figure><figure class="icon"><img src="icons/send.svg"/><figcaption>send</figcaption></figure><figure class="icon"><img src="icons/spark.svg"/><figcaption>spark</figcaption></figure></div>
</section>
</body>
</html>
