<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>concept-5-hybrid-dim</title>
  <style>
    :root {
      --bg: #05070A;
      --cyan: 70, 182, 255;
      --cyan-soft: 95, 212, 255;
      --cyan-pale: 204, 250, 255;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: fixed;
      inset: 0;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 24% 18%, rgba(var(--cyan), 0.052) 0%, rgba(var(--cyan), 0.032) 19%, rgba(var(--cyan), 0.010) 42%, rgba(var(--cyan), 0) 68%),
        radial-gradient(ellipse at 76% 78%, rgba(var(--cyan-soft), 0.045) 0%, rgba(var(--cyan-soft), 0.024) 22%, rgba(var(--cyan-soft), 0.008) 46%, rgba(var(--cyan-soft), 0) 70%),
        radial-gradient(ellipse at 46% 54%, rgba(var(--cyan), 0.030) 0%, rgba(var(--cyan), 0.016) 28%, rgba(var(--cyan), 0) 63%),
        linear-gradient(180deg, #05070A 0%, #05070A 100%);
      isolation: isolate;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: -4%;
      pointer-events: none;
    }

    .scene::before {
      opacity: 0.8;
      background:
        radial-gradient(circle at 13% 12%, rgba(var(--cyan-pale), 0.13) 0 0.7px, transparent 1.2px),
        radial-gradient(circle at 86% 17%, rgba(var(--cyan), 0.10) 0 0.8px, transparent 1.4px),
        radial-gradient(circle at 28% 34%, rgba(var(--cyan-pale), 0.11) 0 0.6px, transparent 1.3px),
        radial-gradient(circle at 67% 39%, rgba(var(--cyan-soft), 0.10) 0 0.7px, transparent 1.5px),
        radial-gradient(circle at 91% 52%, rgba(var(--cyan), 0.12) 0 0.7px, transparent 1.4px),
        radial-gradient(circle at 11% 67%, rgba(var(--cyan-pale), 0.10) 0 0.8px, transparent 1.5px),
        radial-gradient(circle at 52% 86%, rgba(var(--cyan-soft), 0.11) 0 0.6px, transparent 1.3px),
        radial-gradient(circle at 80% 91%, rgba(var(--cyan), 0.10) 0 0.7px, transparent 1.4px);
      animation: fieldBreath 84s ease-in-out infinite;
    }

    .scene::after {
      opacity: 0.64;
      background:
        repeating-radial-gradient(circle at 37% 22%, rgba(var(--cyan), 0.034) 0 0.6px, rgba(var(--cyan), 0) 0.9px 52px),
        repeating-radial-gradient(circle at 64% 74%, rgba(var(--cyan-soft), 0.026) 0 0.5px, rgba(var(--cyan-soft), 0) 0.8px 61px);
      animation: dustBreath 96s ease-in-out infinite;
    }

    #nebula-dust {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.82;
    }

    .network {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      transform-box: fill-box;
      transform-origin: center;
    }

    .network-back {
      opacity: 0.72;
      animation: netBackBreath 76s ease-in-out infinite;
    }

    .network-front {
      opacity: 0.84;
      animation: netFrontBreath 68s ease-in-out infinite;
    }

    .edge {
      fill: none;
      stroke: rgb(var(--cyan-soft));
      stroke-width: 0.72;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-opacity: 0.14;
    }

    .edge.quiet {
      stroke: rgb(var(--cyan));
      stroke-width: 0.56;
      stroke-opacity: 0.105;
    }

    .edge.near {
      stroke: rgb(var(--cyan-pale));
      stroke-width: 0.68;
      stroke-opacity: 0.18;
    }

    .node {
      fill: rgb(var(--cyan));
      fill-opacity: 0.13;
      stroke: rgb(var(--cyan-pale));
      stroke-width: 0.58;
      stroke-opacity: 0.17;
    }

    .node.soft {
      fill: rgb(var(--cyan-soft));
      fill-opacity: 0.105;
      stroke-opacity: 0.13;
    }

    .node.near {
      fill: rgb(var(--cyan-pale));
      fill-opacity: 0.18;
      stroke: rgb(var(--cyan-soft));
      stroke-opacity: 0.20;
    }

    .pin {
      fill: rgb(var(--cyan-pale));
      fill-opacity: 0.18;
    }

    .character-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 274px;
      height: 274px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: characterBreath 70s ease-in-out infinite;
    }

    .rim {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 268px;
      height: 268px;
      border: 1px solid rgba(var(--cyan-soft), 0.105);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(var(--cyan), 0) 0 54%, rgba(var(--cyan), 0.040) 55%, rgba(var(--cyan-soft), 0.020) 61%, rgba(var(--cyan), 0) 66%),
        radial-gradient(circle at 50% 50%, rgba(var(--cyan-pale), 0.026) 0%, rgba(var(--cyan), 0.012) 34%, rgba(var(--cyan), 0) 64%);
      opacity: 0.74;
    }

    .rim::before,
    .rim::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .rim::before {
      inset: 22px;
      border: 1px solid rgba(var(--cyan-pale), 0.075);
    }

    .rim::after {
      left: 50%;
      top: 16px;
      width: 5px;
      height: 5px;
      transform: translateX(-50%);
      background: rgba(var(--cyan-pale), 0.16);
      border: 1px solid rgba(var(--cyan-soft), 0.10);
    }

    .character {
      position: absolute;
      left: 50%;
      top: 50%;
      display: block;
      width: 240px;
      height: auto;
      transform: translate(-50%, -50%);
      user-select: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(5, 7, 10, 0) 0%, rgba(5, 7, 10, 0.08) 64%, rgba(5, 7, 10, 0.44) 100%),
        linear-gradient(180deg, rgba(5, 7, 10, 0.16) 0%, rgba(5, 7, 10, 0) 28%, rgba(5, 7, 10, 0) 66%, rgba(5, 7, 10, 0.22) 100%);
      z-index: 4;
    }

    .static *,
    .static .scene::before,
    .static .scene::after {
      animation-play-state: paused !important;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      .scene::before,
      .scene::after {
        animation: none !important;
      }
    }

    @keyframes fieldBreath {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.72;
      }
      50% {
        transform: translate3d(1.2px, -1.8px, 0) scale(1.004);
        opacity: 0.86;
      }
    }

    @keyframes dustBreath {
      0%, 100% {
        transform: translate3d(0, 0, 0);
        opacity: 0.54;
      }
      50% {
        transform: translate3d(-1.4px, 1px, 0);
        opacity: 0.66;
      }
    }

    @keyframes netBackBreath {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(-1px, 1.5px, 0) scale(1.003);
      }
    }

    @keyframes netFrontBreath {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(1.2px, -1px, 0) scale(1.002);
      }
    }

    @keyframes characterBreath {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, calc(-50% - 1px)) scale(1.0018);
      }
    }
  </style>
</head>

  <script>
    (() => {
      const canvas = document.getElementById("nebula-dust");
      const ctx = canvas.getContext("2d", { alpha: true });
      const W = 510;
      const H = 900;
      const paint = () => {
        ctx.clearRect(0, 0, W, H);
        ctx.globalCompositeOperation = "source-over";

        const clouds = [
          [118, 180, 186, 0.052],
          [386, 650, 230, 0.046],
          [250, 470, 275, 0.034],
          [432, 162, 150, 0.030],
          [92, 716, 176, 0.028]
        ];

        for (const [x, y, r, a] of clouds) {
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, `rgba(70,182,255,${a})`);
          g.addColorStop(0.34, `rgba(70,182,255,${a * 0.55})`);
          g.addColorStop(0.72, `rgba(95,212,255,${a * 0.18})`);
          g.addColorStop(1, "rgba(70,182,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        let seed = 27;
        const random = () => {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        };

        for (let i = 0; i < 96; i += 1) {
          const x = random() * W;
          const y = random() * H;
          const r = 0.36 + random() * 0.58;
          const a = 0.10 + random() * 0.06;
          const g = ctx.createRadialGradient(x, y, 0, x, y, r + 0.9);
          g.addColorStop(0, `rgba(204,250,255,${a})`);
          g.addColorStop(1, "rgba(204,250,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r + 0.9, 0, Math.PI * 2);
          ctx.fill();
        }
      };

      paint();

      let slowFrames = 0;
      let last = performance.now();
      const watch = (now) => {
        const delta = now - last;
        last = now;
        slowFrames = delta > 120 ? slowFrames + 1 : Math.max(0, slowFrames - 1);
        if (slowFrames >= 5) {
          document.documentElement.classList.add("static");
          return;
        }
        requestAnimationFrame(watch);
      };

      requestAnimationFrame(watch);
    })();
  </script>
