<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=510, initial-scale=1">
<title>2nd-B Neural Concept</title>
<style>
  :root {
    --bg: #0A0E1A;
    --blue: #46B6FF;
    --ice: #CCFAFF;
    --cyan: #5FD4FF;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    display: grid;
    place-items: center;
  }

  .stage {
    position: relative;
    width: 510px;
    height: 900px;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(circle at 50% 48%, rgba(70, 182, 255, 0.10), transparent 25%),
      radial-gradient(circle at 50% 44%, rgba(204, 250, 255, 0.045), transparent 32%),
      linear-gradient(180deg, #0B1021 0%, var(--bg) 48%, #080B15 100%);
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 510px;
    height: 900px;
    display: block;
  }

  .soft-vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 47%, transparent 0 26%, rgba(10, 14, 26, 0.22) 45%, rgba(10, 14, 26, 0.70) 100%),
      radial-gradient(circle at 50% 88%, rgba(70, 182, 255, 0.05), transparent 28%);
    z-index: 2;
  }

  .rim-halo {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 330px;
    height: 330px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    background:
      radial-gradient(circle, rgba(204, 250, 255, 0.18) 0 10%, rgba(95, 212, 255, 0.10) 24%, rgba(70, 182, 255, 0.04) 42%, transparent 66%);
    filter: blur(10px);
    opacity: 0.82;
    animation: breathe 8s ease-in-out infinite;
    z-index: 3;
  }

  .character {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 240px;
    transform: translate(-50%, -50%);
    z-index: 5;
    filter:
      drop-shadow(0 0 12px rgba(70, 182, 255, 0.80))
      drop-shadow(0 0 30px rgba(95, 212, 255, 0.34));
    animation: floatBot 9s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,
    100% {
      transform: translate(-50%, -50%) scale(0.96);
      opacity: 0.68;
    }
    50% {
      transform: translate(-50%, -50%) scale(1.04);
      opacity: 0.96;
    }
  }

  @keyframes floatBot {
    0%,
    100% {
      transform: translate(-50%, -50%) translateY(0);
    }
    50% {
      transform: translate(-50%, -50%) translateY(-5px);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .rim-halo,
    .character {
      animation: none;
    }
  }
</style>
</head>
<body>
  <main class="stage" aria-hidden="true">
    <canvas id="neural" width="510" height="900"></canvas>
    <div class="soft-vignette"></div>
    <div class="rim-halo"></div>
    <img class="character" src="../assets/head-angle-v2/secondb_head_angle_v2_r02_level_c01_front.png" alt="">
  </main>
<script>
(() => {
  const canvas = document.getElementById('neural');
  const ctx = canvas.getContext('2d');
  const w = 510;
  const h = 900;
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const blue = '#46B6FF';
  const ice = '#CCFAFF';
  const cyan = '#5FD4FF';

  function mulberry32(seed) {
    return function rand() {
      seed |= 0;
      seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  const rand = mulberry32(240201);
  const nodes = [];
  const bands = [
    { x0: 34, x1: 185, y0: 76, y1: 775 },
    { x0: 325, x1: 476, y0: 76, y1: 775 },
    { x0: 78, x1: 432, y0: 80, y1: 248 },
    { x0: 58, x1: 452, y0: 704, y1: 838 }
  ];

  for (let i = 0; i < 34; i++) {
    const band = bands[i % bands.length];
    const x = band.x0 + rand() * (band.x1 - band.x0);
    const y = band.y0 + rand() * (band.y1 - band.y0);
    nodes.push({
      x,
      y,
      baseX: x,
      baseY: y,
      r: 4.5 + rand() * 8.5,
      phase: rand() * Math.PI * 2,
      drift: 5 + rand() * 10,
      speed: 0.10 + rand() * 0.18
    });
  }

  const stars = Array.from({ length: 46 }, () => ({
    x: rand() * w,
    y: rand() * h,
    r: 0.5 + rand() * 1.2,
    a: 0.14 + rand() * 0.34,
    phase: rand() * Math.PI * 2
  }));

  function clearZone(a, b) {
    const dx = a.x - 255;
    const dy = a.y - 450;
    const dx2 = b.x - 255;
    const dy2 = b.y - 450;
    return Math.hypot(dx, dy) > 132 && Math.hypot(dx2, dy2) > 132;
  }

  function draw(t) {
    const time = t * 0.001;
    ctx.clearRect(0, 0, w, h);

    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#0B1021');
    bg.addColorStop(0.52, '#0A0E1A');
    bg.addColorStop(1, '#070A14');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of stars) {
      const alpha = s.a * (0.66 + Math.sin(time * 0.35 + s.phase) * 0.28);
      ctx.beginPath();
      ctx.fillStyle = `rgba(204,250,255,${alpha})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    for (const n of nodes) {
      n.x = n.baseX + Math.sin(time * n.speed + n.phase) * n.drift;
      n.y = n.baseY + Math.cos(time * n.speed * 0.82 + n.phase) * n.drift * 0.55;
    }

    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i];
        const b = nodes[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < 126 && clearZone(a, b)) {
          const pulse = 0.48 + Math.sin(time * 0.48 + a.phase + b.phase) * 0.28;
          const alpha = Math.max(0, (1 - d / 126) * 0.28 * pulse);
          ctx.strokeStyle = `rgba(70,182,255,${alpha})`;
          ctx.lineWidth = 1.2 + (1 - d / 126) * 1.6;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          const mx = (a.x + b.x) * 0.5;
          const my = (a.y + b.y) * 0.5 + Math.sin(time * 0.2 + i) * 5;
          ctx.quadraticCurveTo(mx, my, b.x, b.y);
          ctx.stroke();
        }
      }
    }

    for (const n of nodes) {
      const pulse = 0.76 + Math.sin(time * 0.55 + n.phase) * 0.24;
      const glow = n.r * (2.8 + pulse);
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glow);
      g.addColorStop(0, `rgba(204,250,255,${0.55 * pulse})`);
      g.addColorStop(0.35, `rgba(95,212,255,${0.18 * pulse})`);
      g.addColorStop(1, 'rgba(70,182,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glow, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(204,250,255,${0.82 * pulse})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = `rgba(70,182,255,${0.50 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * (1.36 + 0.10 * pulse), 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();

    if (!reduced) requestAnimationFrame(draw);
  }

  draw(0);
})();
</script>
</body>
</html>
