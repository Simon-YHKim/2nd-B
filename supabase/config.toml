# Supabase project config (auto-loaded by the Supabase CLI / Edge Function
# deploy tooling). For function-level settings only — project settings live
# in the Dashboard.

project_id = "zoacryukmdeivmolvyhj"

# ⚠ `supabase config push` semantics: declaring ANY [auth] subsection pushes the
# WHOLE auth group -- every UNDECLARED field resets to CLI defaults, and in a
# non-TTY shell the confirm prompt auto-accepts. That exact combination reset
# production auth on 2026-07-16 (site_url -> localhost, redirect URLs lost,
# Confirm-Email off) before this block existed. Everything below is therefore
# the DECLARED production truth: keep it in sync with the dashboard, and never
# push with a partial [auth] block again.
[auth]
enabled = true
site_url = "https://simon-yhkim.github.io/2nd-B/"
additional_redirect_urls = [
  "https://simon-yhkim.github.io/2nd-B/**",
  "secondbrain://**",
  "http://localhost:8081/**",
  "https://simon-yhkim.github.io/2nd-B/",
  "secondbrain://",
]

[auth.email]
enable_signup = true
# Confirm Email stays ON (the #1009 email-confirmation track depends on it; the
# 0018 autoconfirm trigger masks it user-side until 0086 lands).
enable_confirmations = true

# Recovery email: show the 6-digit code the in-screen OTP reset flow (#1013)
# verifies, alongside the classic link (both consume the same token).
[auth.email.template.recovery]
subject = "[2nd-Brain] 비밀번호 재설정 인증번호 / Password reset code"
content_path = "./supabase/templates/recovery.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.gemini-proxy]
verify_jwt = true

[functions.claude-proxy]
# Anthropic backend for D-26 Phase 2 purpose-keyed vendor routing (and the
# legacy EXPO_PUBLIC_REASONING_PROVIDER=claude seam). Mirrors gemini-proxy's
# security boundary; the ANTHROPIC_API_KEY stays in Edge Function Secrets
# (never the client bundle). verify_jwt=true so only signed-in users reach
# the paid model.
verify_jwt = true

[functions.openai-proxy]
# OpenAI backend for D-26 Phase 2. Serves ONLY its seated purposes
# (cluster_infer, safety_classify — both purpose-allowlisted 400 otherwise;
# note neither seat is client-wired yet, so all legitimate traffic is future).
# Fork of claude-proxy: same crisis gate, same SHARED per-user/day spend
# counter (bump_gemini_spend), same premium gate + audit. OPENAI_API_KEY
# stays in Edge Function Secrets. Never deploy --no-verify-jwt.
verify_jwt = true

[functions.delete-account]
# Terminal account erasure (GDPR/PIPA). verify_jwt=true so the gateway
# validates the caller; the function erases ONLY the caller's own account
# (user_id derived from the JWT, never from the request body).
verify_jwt = true

[functions.export-account]
# Subject data portability (GDPR Art.20 / PIPA). verify_jwt=true so the gateway
# validates the caller; the function exports ONLY the caller's own data
# (user_id derived from the JWT, never from the request body), the same
# IDOR-safety contract as delete-account. Never deploy with --no-verify-jwt.
verify_jwt = true

[functions.oauth-naver]
# Pre-auth endpoint - the function IS the auth boundary: it validates the user
# via Naver's OAuth and only then mints a Supabase session. (Kakao uses the
# native Supabase provider now, so it has no edge function.)
verify_jwt = false

[functions.rss-proxy]
# Web CORS proxy for the curated RSS feeds (Codex P2 #4). verify_jwt=true so only
# signed-in app users can call it (not an open relay); the function fetches ONLY
# an exact-match URL from the feeds allowlist (SSRF guard). Must be deployed for
# the web build's news digest to work; native fetches feeds directly.
verify_jwt = true
