name: Web preview (GitHub Pages)

# Publishes the Expo Web static export to GitHub Pages via the
# legacy/branch source (peaceiris/actions-gh-pages). This bypasses
# the github-pages environment entirely — which is necessary because
# that environment defaults to a main-only branch policy that the
# default GITHUB_TOKEN cannot relax (administration:write is required
# to mutate env policies, but enabling that permission causes this
# workflow to fail to register on non-main branches).
#
# URL after first successful deploy:
#   https://simon-yhkim.github.io/2nd-B/
#
# Note on env vars: deployed site uses Supabase via repo Variables
# (Settings → Secrets and variables → Actions → Variables):
#   EXPO_PUBLIC_SUPABASE_URL
#   EXPO_PUBLIC_SUPABASE_ANON_KEY

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      allow_dev_tier:
        description: "QA ONLY - honor ?tier= URL links (self-grants a paid tier). Ignored on a push to main."
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Build Expo Web (static export)
        env:
          # UI track: the LIVE web build now ships the deep-space character shell
          # (cutover 2026-06-17, design handoff). The integrated shell — status
          # header + 5-tab dock + constellation home + 담기/세컨비/나/IDEN views —
          # is in place; remaining deep-space sub-screens (graph/clipper/account/
          # settings re-theme) are follow-ups, reachable via the existing routes.
          # EAS native production stays pinned to legacy (eas.json) until parity.
          # To roll the web build back to legacy: set this to "legacy".
          EXPO_PUBLIC_UI: "deep-space"
          # QA ONLY, and only via a manual workflow_dispatch that opts in: lets
          # ?tier=all|free|plus|pro URL links force a tier. This workflow's push
          # trigger IS the public site (the "preview" in the name is historical),
          # so a push to main must never enable it — `inputs` is empty for a push
          # event, which resolves this to "false". Previously hardcoded "true",
          # which shipped a URL-param paywall bypass to the live site.
          EXPO_PUBLIC_ALLOW_DEV_TIER: ${{ inputs.allow_dev_tier && 'true' || 'false' }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          # Korea public-data keys (G1 IN-bound enrichment): Eximbank FX rates for
          # the ledger (src/lib/finance/fx.ts) + MFDS food-nutrition for the meal
          # planner (src/lib/nutrition/foods.ts). EXPO_PUBLIC_ = bundled client-side
          # by design; both are free, low-sensitivity public-data keys. An unset
          # Variable degrades gracefully (KRW-only / idea-only), so a missing key
          # never breaks the build.
          EXPO_PUBLIC_EXIM_FX_KEY: ${{ vars.EXPO_PUBLIC_EXIM_FX_KEY }}
          EXPO_PUBLIC_MFDS_FOOD_KEY: ${{ vars.EXPO_PUBLIC_MFDS_FOOD_KEY }}
          # Google OAuth Web client id (public, not a secret) for the Calendar/
          # Tasks import connector (GIS token model — src/lib/google/). Unset →
          # the "Connect Google" action is hidden; nothing else is affected.
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_CLIENT_ID }}
          # LLM mode + key: when the repo Variable EXPO_PUBLIC_GOOGLE_API_KEY is
          # set, builds default to "live"; otherwise mock. Override by setting
          # the Variable EXPO_PUBLIC_LLM_MODE explicitly.
          EXPO_PUBLIC_LLM_MODE: ${{ vars.EXPO_PUBLIC_LLM_MODE || 'mock' }}
          EXPO_PUBLIC_GOOGLE_API_KEY: ${{ vars.EXPO_PUBLIC_GOOGLE_API_KEY }}
          # Route Gemini through the gemini-proxy Edge Function so the API key
          # stays server-side (Supabase secret GEMINI_API_KEY) and is NEVER
          # inlined into the public web bundle. REQUIRED for live web: set repo
          # Variable EXPO_PUBLIC_LLM_VIA_EDGE_FUNCTION=true alongside LLM_MODE=live.
          EXPO_PUBLIC_LLM_VIA_EDGE_FUNCTION: ${{ vars.EXPO_PUBLIC_LLM_VIA_EDGE_FUNCTION || 'false' }}
          # D-27 axis-key pin: route every Gemini seat to gemini-3.5-flash so live
          # calls resolve the dedicated GEMINI_API_KEY__G35FLASH__{effort} combo
          # keys (a G25* slug would fall back to the base key). Overridable via a
          # repo Variable of the same name.
          EXPO_PUBLIC_MODEL_LITE: ${{ vars.EXPO_PUBLIC_MODEL_LITE || 'gemini-3.5-flash' }}
          EXPO_PUBLIC_MODEL_FLASH: ${{ vars.EXPO_PUBLIC_MODEL_FLASH || 'gemini-3.5-flash' }}
          EXPO_PUBLIC_MODEL_PRO: ${{ vars.EXPO_PUBLIC_MODEL_PRO || 'gemini-3.5-flash' }}
          # Reasoning-seat provider parity with the native builds (eas.json +
          # android-release.yml pin "claude"): left unset, the live web silently
          # served the reasoning seat from the Gemini backbone instead.
          EXPO_PUBLIC_REASONING_PROVIDER: ${{ vars.EXPO_PUBLIC_REASONING_PROVIDER || 'claude' }}
          # D-26 purpose-keyed routing phase. "1" = current posture (no behavior
          # change); flip the repo Variable to "2" to activate Phase 2 routing.
          EXPO_PUBLIC_LLM_PHASE: ${{ vars.EXPO_PUBLIC_LLM_PHASE || '1' }}
          # Naver social sign-up (custom OAuth via the oauth-naver edge function,
          # already in-repo). Server side confirmed live 2026-07-15 (Simon):
          # oauth-naver deployed with its secrets and the app registered at
          # developers.naver.com (callback <origin>/2nd-B/oauth-callback), so the
          # default is now "true". The button still needs EXPO_PUBLIC_NAVER_CLIENT_ID
          # set below, since isNaverEnabled() gates on the id too. The '|| true'
          # also keeps an unset Variable from feeding zod an empty string. Set the
          # Variable to "false" to hide it on a deploy where the server is not ready.
          EXPO_PUBLIC_ENABLE_NAVER: ${{ vars.EXPO_PUBLIC_ENABLE_NAVER || 'true' }}
          # Supabase-native social providers. Buttons show only when the provider
          # is actually enabled in the Supabase console AND the matching Variable
          # is "true". Simon confirmed Google/Kakao/GitHub are enabled server-side
          # (2026-07-15), so those default "true". Apple stays "false" pending
          # Apple Developer / App Store review; Facebook is unset here (env.ts
          # default "false"). A provider left "false" hides its button so users
          # never hit a raw provider error page (the 2026-06-11 live-QA failure).
          EXPO_PUBLIC_ENABLE_GOOGLE: ${{ vars.EXPO_PUBLIC_ENABLE_GOOGLE || 'true' }}
          EXPO_PUBLIC_ENABLE_APPLE: ${{ vars.EXPO_PUBLIC_ENABLE_APPLE || 'false' }}
          EXPO_PUBLIC_ENABLE_KAKAO: ${{ vars.EXPO_PUBLIC_ENABLE_KAKAO || 'true' }}
          EXPO_PUBLIC_ENABLE_GITHUB: ${{ vars.EXPO_PUBLIC_ENABLE_GITHUB || 'true' }}
          EXPO_PUBLIC_NAVER_CLIENT_ID: ${{ vars.EXPO_PUBLIC_NAVER_CLIENT_ID }}
          # Analytics (Simon directive 2026-06-11): the client code has been
          # consent-gated and wired since #258, but the build never injected
          # the ids, so live collection was a no-op. All optional: an unset
          # Variable keeps that tool off. Set the four Variables to activate
          # (GA4 G-xxxx, Clarity project id, Sentry DSN, PostHog key).
          EXPO_PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.EXPO_PUBLIC_GA4_MEASUREMENT_ID }}
          EXPO_PUBLIC_CLARITY_PROJECT_ID: ${{ vars.EXPO_PUBLIC_CLARITY_PROJECT_ID }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.EXPO_PUBLIC_POSTHOG_KEY }}
          # PostHog needs BOTH key and host (analytics/index.ts gates on the
          # pair) plus the posthog-js package — see docs/ADS.md before relying
          # on it.
          EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.EXPO_PUBLIC_POSTHOG_HOST }}
          # Ads (web AdSense), OFF until the Variables are set AND the
          # in-app policy passes (free adult + explicit ads consent + neutral
          # route — src/lib/ads/policy.ts). See docs/ADS.md for go-live steps.
          EXPO_PUBLIC_ENABLE_ADS: ${{ vars.EXPO_PUBLIC_ENABLE_ADS || 'false' }}
          EXPO_PUBLIC_ADSENSE_CLIENT: ${{ vars.EXPO_PUBLIC_ADSENSE_CLIENT }}
          EXPO_PUBLIC_ADSENSE_SLOT_RECORDS: ${{ vars.EXPO_PUBLIC_ADSENSE_SLOT_RECORDS }}
          EXPO_USE_STATIC: "true"
        run: |
          # base-path (/2nd-B) comes from expo.experiments.baseUrl in app.json,
          # so `expo export` emits correctly-prefixed asset AND client-router
          # paths. No manual sed patching needed (that only fixed asset URLs
          # and left the router unaware of the subpath — the root-URL 404 bug).
          npx expo export --platform web --output-dir dist
          # SPA fallback + Jekyll opt-out.
          cp dist/index.html dist/404.html 2>/dev/null || true
          touch dist/.nojekyll
      - name: Deploy to gh-pages branch
        # H1 (docs/security/2026-05-26-SUMMARY.md): pin third-party action by SHA
        # to prevent a tag retargeting / repo takeover from injecting a malicious
        # release. v4.0.0 → 4f9cc6602d3f66b9c108549d475ec49e8ef4d45e.
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "deploy: ${{ github.sha }}"
      # Switch Pages source AFTER gh-pages exists. On the very first run
      # this is the moment the branch becomes valid as a Pages source.
      - name: Switch Pages source to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          # POST creates Pages if it doesn't exist (201) or 409 if it does.
          POST_STATUS=$(curl -s -o /tmp/pages-post.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "POST /pages (source:gh-pages) → $POST_STATUS"
          # PUT switches an existing Pages site to the gh-pages branch source.
          PUT_STATUS=$(curl -s -o /tmp/pages-put.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"},"build_type":"legacy"}')
          echo "PUT /pages (build_type:legacy) → $PUT_STATUS"
          if [ "$POST_STATUS" != "201" ] && [ "$PUT_STATUS" != "200" ] && [ "$PUT_STATUS" != "204" ]; then
            echo "POST body:"; cat /tmp/pages-post.json
            echo "PUT body:";  cat /tmp/pages-put.json
          fi
