name: Web preview (GitHub Pages)

# Publishes the Expo Web static export to GitHub Pages.
# Minimal workflow — no configure-pages, no env-policy mutation. The
# curl POST to /pages enables Pages on first run; deploy-pages handles
# the rest. If the github-pages environment has a branch restriction,
# deploy will surface a clear error message rather than fast-fail.
#
# URL after first successful deploy:
#   https://simon-yhkim.github.io/2nd-B/
#
# Note on env vars: deployed site uses Supabase via repo Variables
# (Settings → Secrets and variables → Actions → Variables):
#   EXPO_PUBLIC_SUPABASE_URL
#   EXPO_PUBLIC_SUPABASE_ANON_KEY
# Both are public-by-design (the anon key is bundled into any client build).

on:
  push:
    branches:
      - main
      - claude/awesome-clarke-ZJgc3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Pages is enabled (workflow source)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          echo "POST /pages → $STATUS"
          if [ "$STATUS" != "201" ] && [ "$STATUS" != "409" ]; then
            echo "Response body:"
            cat /tmp/pages.json
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Build Expo Web (static export)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_LLM_MODE: mock
          EXPO_USE_STATIC: "true"
          EXPO_BASE_URL: /2nd-B/
        run: |
          npx expo export --platform web --output-dir dist
          # GitHub Pages serves /2nd-B/* — patch absolute /_expo/ paths.
          find dist -name "*.html" -print0 | xargs -0 sed -i 's|"/_expo/|"/2nd-B/_expo/|g'
          find dist -name "*.html" -print0 | xargs -0 sed -i 's|"/assets/|"/2nd-B/assets/|g'
          # Pages SPA fallback: copy index.html to 404.html so client-side
          # routes resolve on direct hit.
          cp dist/index.html dist/404.html 2>/dev/null || true
          # Disable Jekyll so files starting with `_` aren't filtered.
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
