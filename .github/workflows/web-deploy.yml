name: Web preview (GitHub Pages)

# Publishes the Expo Web static export to GitHub Pages.
# The first step auto-enables Pages via the REST API so Simon doesn't have to
# click anything (the workflow's GITHUB_TOKEN with pages:write is sufficient).
#
# URL after first successful deploy:
#   https://simon-yhkim.github.io/2nd-B/
#
# Note on env vars: deployed site uses Supabase + optional Gemini via repo
# Variables (Settings → Secrets and variables → Actions → Variables):
#   EXPO_PUBLIC_SUPABASE_URL
#   EXPO_PUBLIC_SUPABASE_ANON_KEY
# Both are public-by-design (the anon key is bundled into any client build).

on:
  push:
    branches:
      - main
      - claude/awesome-clarke-ZJgc3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Opt-in to Node 24 for v4 actions per GitHub's 2026-09 deprecation.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages is already enabled on this repo (curl POST in earlier run
      # returned 201). configure-pages without enablement just resolves the
      # Pages URL — no elevated permissions needed.
      - name: Configure Pages
        uses: actions/configure-pages@v5
      # Some accounts default the github-pages env to a single-branch policy
      # (usually `main`). For a preview branch we either need to allow this
      # branch or remove the policy entirely. Best-effort: never fail the
      # build on env-mutation errors — deploy-pages will report the real
      # issue with a useful message and we don't want to mask its output.
      - name: Allow this branch to deploy to github-pages (best-effort)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set +e
          ENV_STATUS=$(curl -sS -o /tmp/env.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/environments/github-pages" \
            -d '{"deployment_branch_policy":{"protected_branches":false,"custom_branch_policies":true}}')
          echo "PUT environments/github-pages → $ENV_STATUS"
          [ "$ENV_STATUS" -ge 400 ] && cat /tmp/env.json || true
          POL_STATUS=$(curl -sS -o /tmp/pol.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/environments/github-pages/deployment-branch-policies" \
            -d "{\"name\":\"$BRANCH\",\"type\":\"branch\"}")
          echo "POST deployment-branch-policies ($BRANCH) → $POL_STATUS"
          [ "$POL_STATUS" -ge 400 ] && [ "$POL_STATUS" -ne 422 ] && cat /tmp/pol.json || true
          # Never fail this step. deploy-pages will print the actionable error.
          exit 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Build Expo Web (static export)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_LLM_MODE: mock
          EXPO_USE_STATIC: "true"
          EXPO_BASE_URL: /2nd-B/
        run: |
          npx expo export --platform web --output-dir dist
          # GitHub Pages serves /2nd-B/* — patch absolute /_expo/ paths.
          # Expo Router static export emits absolute /_expo/... script URLs by
          # default; rewrite to /2nd-B/_expo/... so they resolve under the
          # repo-name subpath.
          find dist -name "*.html" -print0 | xargs -0 sed -i 's|"/_expo/|"/2nd-B/_expo/|g'
          find dist -name "*.html" -print0 | xargs -0 sed -i 's|"/assets/|"/2nd-B/assets/|g'
          # Pages SPA fallback: copy index.html to 404.html so client-side
          # routes resolve on direct hit.
          cp dist/index.html dist/404.html 2>/dev/null || true
          # Disable Jekyll so files starting with `_` aren't filtered.
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
