name: EAS iOS Build (IPA)

# iOS twin of eas-preview-build.yml (EAS Android Build). Produces the iOS
# release artifact with EAS-managed signing:
#   preview    -> internal-distribution IPA (ad hoc; installable only on
#                 devices registered with the Apple team)
#   production -> App Store IPA (TestFlight / App Store Connect via
#                 `eas submit -p ios` afterwards; submit.production.ios in
#                 eas.json already pins ascAppId 6792266942 / team 7CP84WS5C6)
#
# FIREBASE CONFIG -- two delivery paths for the SAME file (run-1 lesson,
# 2026-07-19, Actions run 29673670150): `eas build` resolves the app config
# ON THIS RUNNER before uploading the archive, and the Expo Google config
# plugin readFileSync's app.json's ios.googleServicesFile at that moment.
# EAS file-type env vars only materialize on the EAS BUILDER, so without a
# runner-side copy config resolution dies with ENOENT (exactly how run #1
# failed, before any slot was consumed). Therefore:
#   - runner: the "Provision GoogleService-Info.plist" step below restores
#     the plist from the GitHub secret GOOGLE_SERVICE_INFO_PLIST_BASE64 and
#     validates BUNDLE_ID. It runs for BOTH profiles -- config resolution
#     always happens, so it must not be production-gated.
#   - builder: the EAS file-type env var GOOGLE_SERVICE_INFO_PLIST provides
#     the same file there (registered in all three environments).
# app.config.js splits the two automatically:
#   process.env.GOOGLE_SERVICE_INFO_PLIST ?? config.ios?.googleServicesFile
# (env unset on the runner -> ./GoogleService-Info.plist fallback; env path
# on the builder). .easignore does not exclude the plist, so the restored
# file also rides the build archive, mirroring the Android twin's
# google-services.json handling. The file stays out of git
# (.gitignore **/GoogleService-Info.plist).
#
# SIGNING (production, decided 2026-07-19): LOCAL credentials, no Apple login.
# The remote EAS-managed path is blocked: Apple's fastlane login 2FA rejects
# the account's phone verification (web login works, fastlane does not), and
# retrying risks an account lock. So nothing in this workflow ever talks to
# Apple. The distribution certificate (.p12) and the App Store provisioning
# profile ("2ndB App Store Distribution", com.simonk.secondbrain, both expire
# 2027-07-19) were issued on the Apple Developer WEB portal and live only in
# GitHub secrets: IOS_DIST_P12_BASE64 / IOS_PROVISIONING_PROFILE_BASE64 /
# IOS_DIST_P12_PASSWORD. The provision step below restores them and writes
# credentials.json (gitignored; the runner is ephemeral, secret values are
# never echoed), and eas.json build.production.ios.credentialsSource="local"
# makes eas-cli read exactly those files.
#   docs: https://docs.expo.dev/app-signing/local-credentials/
# The ASC API key already stored on EAS (Key ID MCNQH5N3US) is for
# `eas submit -p ios` only and stays untouched by this flow.
# NOTE: the preview (ad hoc) iOS profile still uses REMOTE credentials and
# would hit the same Apple-auth wall -- production is the supported iOS
# profile for now.
#
# Build slots: every run consumes an EAS build slot -- trigger only after the
# owner confirms (workflow_dispatch keeps this human-gated by construction).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (preview = internal ad-hoc IPA, production = App Store IPA)"
        required: true
        type: choice
        options:
          - preview
          - production
        default: production
      message:
        description: "Build message shown in EAS"
        required: false
        default: "Firebase-enabled iOS release"

permissions:
  contents: read

concurrency:
  group: eas-ios-build-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build_id: ${{ steps.submit_build.outputs.build_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify OTA/native runtime policy
        run: npm run check:ota-runtime

      # Runner-side Firebase config for app-config resolution (see the
      # FIREBASE CONFIG header note). Mirrors the Android twin's
      # "Provision google-services.json" step. Deliberately NOT gated on the
      # profile: config resolution happens for preview and production alike.
      - name: Provision GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICE_INFO_PLIST_BASE64:-}" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST_BASE64 is required for EAS iOS builds."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 -d > GoogleService-Info.plist
          if [ ! -s GoogleService-Info.plist ]; then
            echo "::error::GoogleService-Info.plist decoded empty; check the secret."
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const xml = fs.readFileSync("GoogleService-Info.plist", "utf8");
            const m = xml.match(/<key>BUNDLE_ID<\/key>\s*<string>([^<]+)<\/string>/);
            if (m?.[1] !== "com.simonk.secondbrain") {
              throw new Error(`Firebase iOS config bundle mismatch: ${m?.[1] ?? "missing"}`);
            }
          '
          echo "Real GoogleService-Info.plist provisioned and validated."

      # Mirrors the Android GOOGLE_SERVICES_JSON_BASE64 restore pattern; see
      # the SIGNING header note. Values flow env -> file only, never echoed.
      - name: Provision iOS signing credentials (local credentialsSource)
        if: ${{ inputs.profile == 'production' }}
        env:
          IOS_DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          set -euo pipefail
          for v in IOS_DIST_P12_BASE64 IOS_PROVISIONING_PROFILE_BASE64 IOS_DIST_P12_PASSWORD; do
            if [ -z "${!v:-}" ]; then
              echo "::error::$v is required for production iOS builds (local credentialsSource)."
              exit 1
            fi
          done
          mkdir -p ios/certs
          printf '%s' "$IOS_DIST_P12_BASE64" | base64 -d > ios/certs/dist.p12
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > ios/certs/profile.mobileprovision
          for f in ios/certs/dist.p12 ios/certs/profile.mobileprovision; do
            if [ ! -s "$f" ]; then
              echo "::error::$f decoded empty; check the corresponding secret."
              exit 1
            fi
          done
          # credentials.json is written via node so the password is
          # JSON-escaped regardless of special characters.
          node -e '
            const fs = require("fs");
            fs.writeFileSync(
              "credentials.json",
              JSON.stringify(
                {
                  ios: {
                    provisioningProfilePath: "ios/certs/profile.mobileprovision",
                    distributionCertificate: {
                      path: "ios/certs/dist.p12",
                      password: process.env.IOS_DIST_P12_PASSWORD,
                    },
                  },
                },
                null,
                2,
              ) + "\n",
            );
          '
          chmod 600 credentials.json ios/certs/dist.p12 ios/certs/profile.mobileprovision
          echo "Local iOS signing credentials provisioned for the production profile."

      - name: Submit EAS iOS build
        id: submit_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_MESSAGE: ${{ inputs.message }}
          BUILD_PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN is required for EAS iOS builds."
            exit 1
          fi
          if [ "$BUILD_PROFILE" != "preview" ] && [ "$BUILD_PROFILE" != "production" ]; then
            echo "::error::Unsupported EAS build profile '$BUILD_PROFILE'."
            exit 1
          fi
          BUILD_JSON="$(npx eas-cli build \
            --platform ios \
            --profile "$BUILD_PROFILE" \
            --message "$BUILD_MESSAGE" \
            --non-interactive \
            --no-wait \
            --json)"
          printf '%s\n' "$BUILD_JSON"
          BUILD_ID="$(
            printf '%s' "$BUILD_JSON" | node -e '
              const fs = require("fs");
              const payload = JSON.parse(fs.readFileSync(0, "utf8"));
              const build = Array.isArray(payload) ? payload[0] : payload;
              if (!build?.id) process.exit(1);
              process.stdout.write(build.id);
            '
          )"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          BUILD_URL="https://expo.dev/accounts/simon_k/projects/2nd-brain/builds/$BUILD_ID"
          echo "::notice title=EAS iOS build submitted::$BUILD_PROFILE build: $BUILD_URL"
          {
            echo "### EAS iOS build submitted"
            echo
            echo "- Profile: \`$BUILD_PROFILE\`"
            echo "- Artifact: IPA ($([ "$BUILD_PROFILE" = "production" ] && echo 'App Store distribution' || echo 'internal ad hoc'))"
            echo "- Build: $BUILD_URL"
          } >> "$GITHUB_STEP_SUMMARY"
