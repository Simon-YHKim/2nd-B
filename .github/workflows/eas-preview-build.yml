name: EAS Preview Build (APK)

# Produces the install-facing preview APK with EAS-managed signing. This is the
# only APK that can upgrade an existing EAS preview install in place.
#
# Firebase configuration is restored from the GitHub Actions secret immediately
# before submission. `.easignore` intentionally does not exclude
# google-services.json, so EAS receives the validated file in its build archive.
# The hosted runner is ephemeral and the file is never committed.

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Build message shown in EAS"
        required: false
        default: "Firebase-enabled preview APK"

permissions:
  contents: read

concurrency:
  group: eas-preview-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify OTA/native runtime policy
        run: npm run check:ota-runtime

      - name: Provision google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 is required for EAS preview builds."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json
          node -e '
            const config = require("./google-services.json");
            const valid = (config.client || []).some(
              (client) =>
                client.client_info?.android_client_info?.package_name ===
                "com.simonk.secondbrain",
            );
            if (!valid) throw new Error("Firebase config package mismatch");
          '
          echo "Real google-services.json provisioned and validated."

      - name: Submit EAS preview APK build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN is required for EAS preview builds."
            exit 1
          fi
          npx eas-cli build \
            --platform android \
            --profile preview \
            --message "$BUILD_MESSAGE" \
            --non-interactive \
            --no-wait
