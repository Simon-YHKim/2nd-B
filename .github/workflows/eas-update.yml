name: EAS Update (OTA)

# Ships JS/asset-only changes over-the-air to already-installed builds via
# EAS Update. An installed build that EMBEDS expo-updates (PR #580) is required
# for an update to reach a device. OTA only carries the JS bundle + assets,
# never native code.
#
# Reaches a device only when ALL of these match the installed build:
#   - channel        : "preview" (the internal preview APK on the test phone)
#   - runtimeVersion : native fingerprint. Native dependencies, config plugins,
#                      permissions, icons, and native config automatically start
#                      a new runtime and require a fresh EAS Build.
#
# Native changes (new npm packages, app.json native config, plugins, icons)
# are NOT deliverable over-the-air — rebuild instead.
#
# ─────────────────────────────────────────────────────────────────────────────
# OTA PUBLISH IS GATED (2026-06-26). It used to auto-publish on EVERY main push
# touching JS paths — which shipped half-finished merges to the test phone and
# was the structural cause of the 06-26 crash incident (a pre-#590 OTA reached
# the device unintentionally). Publish now requires EXPLICIT INTENT:
#   1. Manual run    : Actions → "EAS Update (OTA)" → Run workflow (pick channel)
#   2. Opt-in marker : the head commit / merge message contains [ota] or [release]
# Any other push to main runs the cheap `gate` job, logs that it skipped, and
# never installs deps or publishes (job stays green, `update` is skipped).
# To ship a merge: add "[ota]" to the squash/merge commit message, or dispatch
# the workflow manually after the merge.
# ─────────────────────────────────────────────────────────────────────────────
#
# Setup (one-time): add repo secret EXPO_TOKEN
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: EXPO_TOKEN   Value: an Expo access token (expo.dev → Account → Access tokens)
# Until the secret exists, the publish job logs a warning and no-ops (no red X).

on:
  push:
    branches:
      - main
    # Only JS/asset-relevant paths can even reach the gate. Docs-only merges are
    # skipped here; the [ota] marker gate below is the second, explicit layer.
    paths:
      - "src/**"
      - "assets/**"
      - "locales/**"
      - ".github/workflows/eas-update.yml"
      - "app.json"
      - "app.config.js"
      - "App.tsx"
      - "index.js"
      - "babel.config.js"
      - "metro.config.js"
      - "package.json"
      - "package-lock.json"
      # The publish step mirrors its EXPO_PUBLIC_* env from eas.json — an env
      # change there must be able to reach the OTA channel too.
      - "eas.json"
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS Update channel to publish to"
        required: false
        default: "preview"

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap decision job — no npm install. Decides whether this run is allowed to
  # publish (manual dispatch, or an [ota]/[release] marker on the head commit).
  gate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
      channel: ${{ steps.decide.outputs.channel }}
    steps:
      - name: Checkout (head commit only — for the message)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Decide whether to publish
        id: decide
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CH="${{ github.event.inputs.channel || 'preview' }}"
            echo "publish=true"   >> "$GITHUB_OUTPUT"
            echo "channel=$CH"     >> "$GITHUB_OUTPUT"
            echo "::notice title=OTA::Manual dispatch — publishing OTA to '$CH'."
          elif git log -1 --pretty=%B | grep -qiE '\[ota\]|\[release\]'; then
            echo "publish=true"      >> "$GITHUB_OUTPUT"
            echo "channel=preview"   >> "$GITHUB_OUTPUT"
            echo "::notice title=OTA::Found [ota]/[release] marker in the head commit — publishing OTA to 'preview'."
          else
            echo "publish=false"     >> "$GITHUB_OUTPUT"
            echo "channel=preview"   >> "$GITHUB_OUTPUT"
            echo "::notice title=OTA::OTA publish gated (skipped). This main push has no [ota]/[release] marker and is not a manual dispatch. Add '[ota]' to the commit/merge message, or run this workflow manually, to ship to the test phone."
          fi

  update:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify OTA/native runtime policy
        run: npm run check:ota-runtime

      - name: Publish OTA update (EAS Update)
        env:
          # eas-cli authenticates non-interactively from EXPO_TOKEN.
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Secret EAS file variables are unavailable to the local update
          # bundler. Mirror the exact Firebase config used by native builds so
          # fingerprint resolution stays identical.
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN is required for OTA publishing."
            exit 1
          fi
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 is required to resolve the native fingerprint."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json
          export GOOGLE_SERVICES_JSON="$PWD/google-services.json"
          node -e '
            const config = require("./google-services.json");
            const clients = config.client || [];
            const valid = clients.some(
              (client) =>
                client.client_info?.android_client_info?.package_name ===
                "com.simonk.secondbrain",
            );
            if (!valid) throw new Error("Firebase config package mismatch");
          '
          CHANNEL="${{ needs.gate.outputs.channel }}"
          # a2z audit 2026-07-11 (P0): `eas update` inlines EXPO_PUBLIC_* into the
          # JS bundle at export time. This job used to inject ONLY the Supabase
          # pair (the 06-26 hotfix), so every published OTA silently DOWNGRADED
          # the installed build — EXPO_PUBLIC_LLM_MODE fell back to mock (dead AI
          # harness), the edge-function route + D-27 model pins disappeared, and
          # the social SDK / Sentry / analytics flags went dark. Mirror the FULL
          # build-profile env from eas.json — the single source of truth the
          # installed binary was built with — keyed by channel (channel names ==
          # profile names), so this job can never drift from the build again.
          # Every mirrored value is EXPO_PUBLIC_* (public by design, already
          # committed in eas.json).
          eval "$(node -e '
            const eas = require("./eas.json");
            const env = (eas.build[process.argv[1]] || {}).env || {};
            for (const [k, v] of Object.entries(env)) {
              if (!k.startsWith("EXPO_PUBLIC_")) continue;
              console.log("export " + k + "=" + JSON.stringify(String(v)));
            }
          ' "$CHANNEL")"
          if [ "$CHANNEL" != "development" ] && [ -z "${EXPO_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::eas.json build profile '$CHANNEL' exposes no EXPO_PUBLIC_* env — refusing to publish an OTA that would downgrade installed builds."
            exit 1
          fi
          echo "Mirrored EXPO_PUBLIC_* env from eas.json profile '$CHANNEL':"
          env | grep -o '^EXPO_PUBLIC_[A-Z0-9_]*' | sort
          MESSAGE="$(git log -1 --pretty=%s)"
          echo "Publishing OTA to channel '$CHANNEL' — \"$MESSAGE\""
          # --environment is required by newer eas-cli in --non-interactive mode; the
          # default EAS environments (development/preview/production) match our channels.
          npx eas-cli update --channel "$CHANNEL" --environment "$CHANNEL" --message "$MESSAGE" --non-interactive
