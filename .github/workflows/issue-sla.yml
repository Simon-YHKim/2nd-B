name: Issue SLA labelling (C11 skeleton)

# C11: 2-business-day response system.
# This workflow currently labels new issues so the owner has a queue view.
# The actual auto-responder + Gmail filter + Devpost mobile push lives in Sprint 1 OPS.

on:
  issues:
    types: [opened, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["needs-triage", "sla:2-business-days"],
            });
