name: Supabase migrations dry-run

on:
  pull_request:
    paths:
      - "db/migrations/**"
      - ".github/workflows/supabase-dry-run.yml"

jobs:
  sql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Seed Supabase compatibility layer (auth schema + roles + auth.users stub)
        env:
          PGPASSWORD: postgres
        run: |
          # The migrations reference auth.uid(), three Supabase roles
          # (authenticated / anon / service_role), and the auth.users table
          # (0018 attaches a BEFORE INSERT trigger to it). Vanilla Postgres
          # has none of these. We stub them just enough that the DDL parses
          # and role-conditional logic (e.g. 0015) sees the roles exist.
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$ SELECT '00000000-0000-0000-0000-000000000000'::uuid $$;
          CREATE TABLE IF NOT EXISTS auth.users (
            id                 uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            email              text,
            email_confirmed_at timestamptz
          );
          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN CREATE ROLE authenticated; END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon')          THEN CREATE ROLE anon;          END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role')  THEN CREATE ROLE service_role;  END IF;
          END $$;
          SQL
      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U postgres -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Confirm key constraints
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "\d+ users" | grep users_birth_date_sane
          psql -h localhost -U postgres -c "\dt guardian_consents" | grep guardian_consents
          psql -h localhost -U postgres -c "\d+ ai_audit_log" | grep vertex_backend
          psql -h localhost -U postgres -c "\d+ revenue_events" | grep month_bucket
          psql -h localhost -U postgres -c "\d+ testimonials" | grep consent_given_at
          psql -h localhost -U postgres -c "\d+ knowledge_sources" | grep ks_must_have
