name: Android Release (APK + AAB)

# Self-contained Android build path: expo prebuild -> local gradle.
# Does NOT require an Expo account / EXPO_TOKEN. Produces a sideload APK and a
# store AAB. Publishes a GitHub Release on a v* tag, on a manual dispatch with a
# release_tag, and on a main push when app.json's version has no Release yet
# (one Release per version). Other main pushes only upload workflow artifacts.
#
# EAS cloud build is the documented secondary path (see eas.json + docs/ANDROID-BUILD.md).

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag (e.g. v0.0.1). When set, a GitHub Release is created with the artifacts attached."
        required: false
        default: ""
  # Auto-build whenever app code/assets/native config land on main (mirrors
  # web-deploy.yml). Path-filtered so docs-only merges don't spend a ~10 min
  # native build. A main push uploads the APK/AAB as workflow artifacts and, when
  # app.json's version has no Release yet, also publishes that version's Release.
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "assets/**"
      - "app.json"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - "config-plugins/**"
      - "babel.config.js"
      - "metro.config.js"
      - "patches/**"
      - ".github/workflows/android-release.yml"
    tags:
      - "v*"

# Needed so the job can create a GitHub Release and upload assets.
permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      # Keep gradle inside the GitHub-hosted runner's memory budget (~7 GB).
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
      # Shrink the otherwise-universal release artifacts to a single ABI. This is
      # read by config-plugins/withAndroidAbiFilter.js during expo prebuild (it
      # writes reactNativeArchitectures), so both the sideload APK and the AAB
      # build arm64-v8a only - the dominant cause of the 148 MB universal APK.
      # NOTE: arm64-v8a covers every phone since ~2015 but drops 32-bit
      # (armeabi-v7a) and x86. Before a real Play submission needing full device
      # reach, widen this (e.g. "arm64-v8a,armeabi-v7a") or split the AAB.
      ANDROID_ABI_FILTER: "arm64-v8a"
      # Inline the real Supabase project at JS-bundle time so the release stops
      # falling back to the demo.invalid placeholder. Prefer repo Variables when
      # set (same source as web-deploy.yml); fall back to the public anon key +
      # URL (anon keys are public by design - RLS guards the data).
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL || 'https://zoacryukmdeivmolvyhj.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvYWNyeXVrbWRlaXZtb2x2eWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjE0MzUsImV4cCI6MjA5NTIzNzQzNX0.neb3x_u8Vo9PaxoVpvfSHHxfpAcqxzoqGBDQV6xUYcs' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild -p android --no-install

      # --- Signing -----------------------------------------------------------
      # Preferred: a REAL upload keystore supplied via repo secrets. Required
      # for Google Play store submission. Add these secrets to use it:
      #   ANDROID_KEYSTORE_BASE64  - base64 of your .jks/.keystore file
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      #
      # Fallback (NO secrets present): a throwaway keystore generated here so
      # the build still produces an installable APK/AAB for INTERNAL / sideload
      # TESTING ONLY. A store-submittable AAB MUST be signed with a real,
      # persistent keystore — do NOT ship the throwaway-signed AAB to Play.
      - name: Resolve signing keystore
        id: signing
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Using real keystore from secrets (store-grade signing)."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "store_password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "key_alias=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_OUTPUT"
            echo "key_password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "is_real=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret found. Generating a THROWAWAY test keystore. The resulting AAB is NOT valid for Play store submission."
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias testkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=2nd-Brain Test, OU=CI, O=2nd-Brain, L=Seoul, S=Seoul, C=KR"
            echo "store_password=android" >> "$GITHUB_OUTPUT"
            echo "key_alias=testkey" >> "$GITHUB_OUTPUT"
            echo "key_password=android" >> "$GITHUB_OUTPUT"
            echo "is_real=false" >> "$GITHUB_OUTPUT"
          fi
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build APK + AAB (release)
        working-directory: android
        run: |
          set -euo pipefail
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file="${{ steps.signing.outputs.keystore_path }}" \
            -Pandroid.injected.signing.store.password="${{ steps.signing.outputs.store_password }}" \
            -Pandroid.injected.signing.key.alias="${{ steps.signing.outputs.key_alias }}" \
            -Pandroid.injected.signing.key.password="${{ steps.signing.outputs.key_password }}"

      - name: Collect and rename artifacts
        id: collect
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::7}"
          OUT="$RUNNER_TEMP/release-artifacts"
          mkdir -p "$OUT"
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n1)
          if [ -z "$APK" ] || [ -z "$AAB" ]; then
            echo "::error::Expected APK and AAB not found (APK='$APK' AAB='$AAB')."
            exit 1
          fi
          cp "$APK" "$OUT/2ndb-$SHA.apk"
          cp "$AAB" "$OUT/2ndb-$SHA.aab"
          echo "apk=$OUT/2ndb-$SHA.apk" >> "$GITHUB_OUTPUT"
          echo "aab=$OUT/2ndb-$SHA.aab" >> "$GITHUB_OUTPUT"
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 2ndb-android-${{ github.sha }}
          path: ${{ steps.collect.outputs.dir }}/*
          if-no-files-found: error
          retention-days: 30

      # Decide whether to publish a GitHub Release and under which tag:
      #   - dispatch with release_tag -> that tag, always publish
      #   - v* tag push               -> that tag, always publish
      #   - main push                 -> v<app.json version>, publish only if that
      #                                  Release does not already exist (one per
      #                                  version; routine pushes just keep artifacts)
      - name: Resolve release target
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"; PUBLISH=true
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"; PUBLISH=true
          else
            TAG="v$(node -p "require('./app.json').expo.version")"
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              PUBLISH=false
            else
              PUBLISH=true
            fi
          fi
          echo "Release target: $TAG (publish=$PUBLISH)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.rel.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          body: |
            Android build for 2nd-Brain.

            - `2ndb-<sha>.apk` - sideload onto a device for testing (`adb install` or open on device).
            - `2ndb-<sha>.aab` - Google Play store upload bundle.

            Signing: ${{ steps.signing.outputs.is_real == 'true' && 'real upload keystore (store-ready)' || 'THROWAWAY test keystore (sideload/testing only, NOT valid for Play submission)' }}.
          files: |
            ${{ steps.collect.outputs.apk }}
            ${{ steps.collect.outputs.aab }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
