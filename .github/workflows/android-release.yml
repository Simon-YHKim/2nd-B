name: Android Diagnostic Build (APK)

# Self-contained Android build path: expo prebuild -> local gradle.
# Does NOT require an Expo account / EXPO_TOKEN. Produces a diagnostic APK
# workflow artifact only. Public GitHub Release APK/AAB files come exclusively
# from EAS Android Build so users never see differently signed duplicates.
#
# See eas.json + docs/ANDROID-BUILD.md for the canonical release path.

on:
  workflow_dispatch:
  # Auto-build whenever app code/assets/native config land on main (mirrors
  # web-deploy.yml). Path-filtered so docs-only merges don't spend a ~10 min
  # native build. A main push uploads an APK workflow artifact for diagnostics
  # but never creates an install-facing Release.
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "assets/**"
      - "app.json"
      - "app.config.js"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - "config-plugins/**"
      - "babel.config.js"
      - "metro.config.js"
      - "patches/**"
      - ".github/workflows/android-release.yml"

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      # Keep gradle inside the GitHub-hosted runner's memory budget (~7 GB).
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
      # Shrink the otherwise-universal release artifacts to a single ABI. This is
      # read by config-plugins/withAndroidAbiFilter.js during expo prebuild (it
      # writes reactNativeArchitectures), so the sideload APK builds arm64-v8a
      # only - the dominant cause of the 148 MB universal APK.
      # NOTE: arm64-v8a covers every phone since ~2015 but drops 32-bit
      # (armeabi-v7a) and x86. Widen this only when a diagnostic APK needs those
      # device classes. Play device delivery is owned by the EAS production AAB.
      ANDROID_ABI_FILTER: "arm64-v8a"
      # Inline the real Supabase project at JS-bundle time so the release stops
      # falling back to the demo.invalid placeholder. Prefer repo Variables when
      # set (same source as web-deploy.yml); fall back to the public anon key +
      # URL (anon keys are public by design - RLS guards the data).
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL || 'https://zoacryukmdeivmolvyhj.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvYWNyeXVrbWRlaXZtb2x2eWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjE0MzUsImV4cCI6MjA5NTIzNzQzNX0.neb3x_u8Vo9PaxoVpvfSHHxfpAcqxzoqGBDQV6xUYcs' }}
      # Mirror eas.json's production profile so the gradle/prebuild artifact is
      # the SAME app EAS builds. Without these, babel-preset-expo inlines env.ts
      # defaults and EXPO_PUBLIC_LLM_MODE falls back to "mock", shipping a native
      # release whose AI harness is dead (templated responses) and whose social
      # login is hidden. All values are EXPO_PUBLIC_* (public by design, already
      # committed in eas.json); the harness routes through the edge proxy so no
      # model key is needed in the build. (audit B1)
      EXPO_PUBLIC_LLM_MODE: "live"
      EXPO_PUBLIC_LLM_VIA_EDGE_FUNCTION: "true"
      EXPO_PUBLIC_REASONING_PROVIDER: "claude"
      # D-27 axis-key pins (parity with eas.json production + web-deploy.yml):
      # without these the bundle falls back to the types.ts gemini-2.5 defaults,
      # so live calls bypass the dedicated GEMINI_API_KEY__G35FLASH__{effort}
      # combo keys the proxy provisions and land on the base-key/legacy path.
      EXPO_PUBLIC_MODEL_LITE: ${{ vars.EXPO_PUBLIC_MODEL_LITE || 'gemini-3.5-flash' }}
      EXPO_PUBLIC_MODEL_FLASH: ${{ vars.EXPO_PUBLIC_MODEL_FLASH || 'gemini-3.5-flash' }}
      EXPO_PUBLIC_MODEL_PRO: ${{ vars.EXPO_PUBLIC_MODEL_PRO || 'gemini-3.5-flash' }}
      # D-26 purpose-keyed routing phase. "1" = current posture (no behavior
      # change); flip the repo Variable to "2" to activate Phase 2 routing.
      EXPO_PUBLIC_LLM_PHASE: ${{ vars.EXPO_PUBLIC_LLM_PHASE || '1' }}
      EXPO_PUBLIC_UI: "deep-space"
      EXPO_PUBLIC_CHARACTER: "fallback"
      EXPO_PUBLIC_FORCE_TIER: "off"
      EXPO_PUBLIC_ENABLE_KAKAO: "true"
      EXPO_PUBLIC_ENABLE_APPLE: "true"
      # Native Google/Kakao SDKs require their own release-key registrations.
      # Until those registrations are verified, use Supabase's browser OAuth
      # flow, which returns through the registered secondbrain:// callback.
      EXPO_PUBLIC_NATIVE_SOCIAL_SDK: "false"
      EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_CLIENT_ID || '160139928684-a3d8fufkppj560cltgaas9qpsfefl72i.apps.googleusercontent.com' }}
      EXPO_PUBLIC_NAVER_CLIENT_ID: ${{ vars.EXPO_PUBLIC_NAVER_CLIENT_ID || 'A1Su7C7EgyR49be6V4rT' }}
      # Optional operational integrations are repo-variable only. An unset
      # variable must stay off; committed fallbacks defeat emergency shutdown.
      EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
      EXPO_PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.EXPO_PUBLIC_GA4_MEASUREMENT_ID }}
      EXPO_PUBLIC_CLARITY_PROJECT_ID: ${{ vars.EXPO_PUBLIC_CLARITY_PROJECT_ID }}
      EXPO_PUBLIC_POSTHOG_KEY: ${{ vars.EXPO_PUBLIC_POSTHOG_KEY }}
      EXPO_PUBLIC_POSTHOG_HOST: ${{ vars.EXPO_PUBLIC_POSTHOG_HOST }}
    steps:
      - name: Validate optional analytics variables
        shell: bash
        run: |
          set -euo pipefail
          if { [ -n "${EXPO_PUBLIC_POSTHOG_KEY:-}" ] && [ -z "${EXPO_PUBLIC_POSTHOG_HOST:-}" ]; } ||
             { [ -z "${EXPO_PUBLIC_POSTHOG_KEY:-}" ] && [ -n "${EXPO_PUBLIC_POSTHOG_HOST:-}" ]; }; then
            echo "::error::EXPO_PUBLIC_POSTHOG_KEY and EXPO_PUBLIC_POSTHOG_HOST must be set together."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify OTA/native runtime policy
        run: npm run check:ota-runtime

      # --- Firebase config ---------------------------------------------------
      # google-services.json is gitignored (never committed). A real config is
      # required through GOOGLE_SERVICES_JSON_BASE64. Failing closed prevents a
      # nominal release whose Firebase native module is present but inert.
      - name: Provision google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 is required for Android releases."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json
          node -e '
            const config = require("./google-services.json");
            const clients = config.client || [];
            const valid = clients.some(
              (client) =>
                client.client_info?.android_client_info?.package_name ===
                "com.simonk.secondbrain",
            );
            if (!valid) throw new Error("Firebase config package mismatch");
          '
          echo "GOOGLE_SERVICES_JSON=$GITHUB_WORKSPACE/google-services.json" >> "$GITHUB_ENV"
          echo "Real google-services.json provisioned and validated."

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild -p android --no-install

      # --- Signing -----------------------------------------------------------
      # Optional: a stable diagnostic keystore supplied via repo secrets:
      #   ANDROID_KEYSTORE_BASE64  - base64 of your .jks/.keystore file
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      #
      # Fallback (NO secrets present): a throwaway keystore generated here so
      # the build still produces an installable APK for INTERNAL / sideload
      # TESTING ONLY. Store-submittable AAB files are built by EAS production.
      - name: Resolve signing keystore
        id: signing
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Using real keystore from secrets (store-grade signing)."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "store_password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "key_alias=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_OUTPUT"
            echo "key_password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_OUTPUT"
            echo "is_real=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret found. Generating a THROWAWAY test keystore for this diagnostic APK."
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias testkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=2nd-Brain Test, OU=CI, O=2nd-Brain, L=Seoul, S=Seoul, C=KR"
            echo "store_password=android" >> "$GITHUB_OUTPUT"
            echo "key_alias=testkey" >> "$GITHUB_OUTPUT"
            echo "key_password=android" >> "$GITHUB_OUTPUT"
            echo "is_real=false" >> "$GITHUB_OUTPUT"
          fi
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build diagnostic APK (release)
        working-directory: android
        run: |
          set -euo pipefail
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${{ steps.signing.outputs.keystore_path }}" \
            -Pandroid.injected.signing.store.password="${{ steps.signing.outputs.store_password }}" \
            -Pandroid.injected.signing.key.alias="${{ steps.signing.outputs.key_alias }}" \
            -Pandroid.injected.signing.key.password="${{ steps.signing.outputs.key_password }}"

      - name: Collect and rename artifacts
        id: collect
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::7}"
          OUT="$RUNNER_TEMP/release-artifacts"
          mkdir -p "$OUT"
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::Expected APK not found."
            exit 1
          fi
          cp "$APK" "$OUT/2ndb-$SHA.apk"
          echo "apk=$OUT/2ndb-$SHA.apk" >> "$GITHUB_OUTPUT"
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 2ndb-android-${{ github.sha }}
          path: ${{ steps.collect.outputs.dir }}/*
          if-no-files-found: error
          retention-days: 30
