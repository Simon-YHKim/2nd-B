name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Lint (C1)
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: i18n key parity (C7)
        run: npm run check:i18n
      - name: Forbidden lexicon scan
        run: npm run check:lexicon
      - name: LLM import boundary (C1)
        run: npm run check:llm-boundary
      - name: Constraints aggregate (C1~C12)
        run: npm run check:constraints
      - name: Unit tests (C9 ordering, C3 audit)
        run: npm test -- --ci
