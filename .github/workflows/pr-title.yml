name: PR title (Conventional Commits)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Title: $TITLE"
          if ! echo "$TITLE" | grep -E '^(feat|fix|chore|refactor|docs|test|perf|build|ci|style|revert)(\([^)]+\))?: .+'; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat: add audit log'"
            exit 1
          fi
